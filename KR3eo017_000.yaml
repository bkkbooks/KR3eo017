body:
  text: 續纂壽世編母汪氏壽康延生第一方臍帶脫落取置新瓦上用炭火焙至煙將盡放地上以瓦盞之類蓋之存性研末透明硃砂研極細末以甘草湯飛過如臍帶末重五分則硃砂只用二分五釐再用生地當歸身煎濃汁蜆殼內調和前二味抹兒口上齶及乳母乳頭上一日之內令兒食盡次日大便遺下穢物終身永無瘡疹及諸疾小兒食鹽蛋成積肉豆蔻一個煨去油煎服連服數個積自化腰痛牛膝杜仲故紙小茴枸杞等分為細末豬腰子去內油薄切數片將藥末遍擦蒸熟細嚼水酒下手足生膊蛇皮油發共燒灰豬油調搽即合成好肉腳指丫濕爛石膏滑石等分明礬少許敷之蛤粉摻之腳汗白礬乾薑各五錢煎水連洗五日自然無汗中飲饌毒不知何物但煎甘草薺苨苦參湯飲之面毒蘿蔔藥箭肉毒大豆煎汁或鹽湯諸鳥肉毒生薑白扁豆蟲魚毒苦參煎醋或紫蘇果菜毒童便中草木藥毒已死只心頭溫者防風擂水灌之葛根煮汁服淡竹葉甘草黑豆同煎服漆毒紫蘇蟹桐油毒甘草乾柿中金石毒生金毒鴨血或雞屎淋汁生銀毒雞子汁蔥汁銅毒慈姑胡桃鐵毒皂莢豬脂乳香錫毒杏仁水銀毒炭末煎汁輕粉毒黃連貫仲雄黃毒防已煎汁火燒昏迷發熱頓飲人尿數碗生蘿蔔汁亦可火毒便不入腹虎爪傷地蠶搗爛塗之豬貓傷恭菜汁內服外塗諸蟲咬傷芋葉搗爛敷之飢餓將死用布浸熱水尉其臍腹以固元氣先用稀米湯緩緩灌下候蘇醒時漸與粥食不可過多酒醉垂危以新汲水浸其發外以舊布浸濕貼胸臘月仍以井水灌之醒後宜食緑豆湯熱死切不可令臥冷地及飲冷水置日中將地上熱灰周臍作一大圍令來往人撒熱尿於圍中蘇後飲熱湯驚死溫酒一兩杯灌之即活打傷閉結白蠟三錢烏藥煎水泡吃二三次定通打死心頭溫雖經日亦可救將患人盤坐提起頭髮以竹筒吹生半夏末入鼻內即活再灌生薑汁以解毒刀斧斬並跌打損破一切水火誤傷飛過五六次黃丹四兩潮腦末二兩共研細末磁罐收遇有諸症蜜調二茶匙敷患處頃刻痛止過夜結痂金瘡傷末透膜者乳香沒藥各二錢童便酒各半盞煎熱調服五倍子末擦之血立止金瘡中風痙強欲死生葛根四兩水煎服金瘡鐵扇散象皮五錢切薄片小鍋焙黃色以干為度勿令焦龍骨五錢用上白者生研老材香一兩山陝等省無漆民間棺殮俱用松香黃蠟塗於棺內數十年後有遷葬者棺朽另易新棺其朽棺內之香臘即謂之老材香東南各省無老材香即以數百年陳石灰代之寸柏香一兩即松香中之黑色者松香一兩與寸柏香一同熔化攪勻傾入冷水取出晾乾飛礬一兩將白礬入鍋內熬透便是以上六味共為細末貯磁罐中遇有刀石破傷者用藥敷傷口以扇向傷處扇之立愈忌臥熱處如傷處發腫煎黃連水用翎毛蘸塗之即消治豬瘟方檳榔草果各二錢五分蒼朮五錢煎水灌下鯉魚煮湯更妙貓犬百病烏藥磨水灌之戒洋煙良方鹿茸一兩二錢焦術一兩使君子一兩法夏一兩炙耆二兩黃連二錢甘草五錢粟殼六錢附片八錢上桂八錢廣皮六錢當歸一兩升麻一兩柴胡一兩高麗參三兩川貝母三錢乾薑四錢芡實二兩共研末每兩用煙一錢癮小者或用七八分亦可合蜜為丸如桐子大癮大者吞三十丸小者吞二十丸再小者吞十五丸二日減吞一丸
