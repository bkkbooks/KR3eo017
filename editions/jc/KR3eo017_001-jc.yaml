彈之即上梅樹根煎水加鹽少許洗之麻油搽芭蕉葉腳魚頭燒灰敥之芭蕉嫩根捶汁水酒兌服渣和醋糟炒熱攤於地上用紙隔肛敷之烏拋茨兜煎水酒兌服重者海金砂稱星樹同煎服外用皂角艾葉煎水少加鹽醋浸洗馬前子焙焦麻油調搽頻治可以斷根下疳明礬皂礬等分為末裝入大棓子內燒灰存性研細末再加冰片三分兒茶少許先用甘草水洗淨然後搽之自愈腎囊風茵陳煎水熏洗小便閉四方白菊花根葉全搗取汁酒沖服車前搗汁入蜜少許空心服螻蛄即土狗一個焙研黃酒送下黍秸紅稈切數段煎湯飲之大便閉五方當歸白芷等分為末每服二錢蜜湯調下老年閉塞不通用火麻仁一盞研水浸取汁芝麻半盞研水浸取汁荊芥穗妙桃仁去皮尖各一兩入鹽少許同煎服大臟實熱不通者大黃皮蛸牙皂等分水煎服風閉氣閉者蘿蔔子炒一合皂角二錢研勻酒下真蘇子胡麻仁各半合研同水浸取汁一碗煮粥食之漸通極效若老人產婦虛秘尤宜大小便閉二方大蜣螂一個六七月間牛糞中尋磚上焙乾大便閉用上截小便閉用下截大小便閉全用研末新汲水調下神效升麻車前子炒各二錢黃酒二盅煎八分服大小便閉炙臍法詩云二便閉結甚難醫急炒鹽來塞滿臍蒜片蓋鹽多灸艾良方妙法少人知隔蔥熨臍法蔥白搗爛炒熱布包兩起更換熨臍下立通再加麝香少許尤妙若系實熱閉結者取蝸牛三個去殼搗融加麝香少許納臍中以手徐徐揉之立通溺血三方旱蓮草車前草搗汁空心溫服炒荊芥炒砂仁等分為末每服三錢糯米飲下白芷當歸各五錢共為末每服二錢米飲下血淋四方核桃一個芝麻一把馬齒莧一握共搗如泥滾酒沖服苧麻根煎湯頻服茅草根車前子等分煎湯沖發灰服地骨皮新鮮者更妙酒煎空心溫服血淋不止二方川牛膝五錢井水煎早午晚服三次馬鞭草不拘多少搗爛絞汁生酒兌熱服三次全愈遠年便血垂危者豆腐末入袋濾出漿者帶渣取用入鍋內炒燥研末每服三錢如下紫紅塊者白糖調下紅血塊者黑糖調下每日用三次真起死回生之神方也赤白濁四方木通七錢滑石三錢粉草四錢蔓荊子一錢水煎空心服椿根白皮兩半乾薑白芍黃柏各炒黑二錢共為末米飲糊丸梧子大每服八十丸空心白水下白濁遺精蓮肉白茯苓等分為末白滾水調服蔥白五六根鹽一撮煎湯熏陽物男子失精女子夢遺二方白芍酒炒龍骨煅牡蠣煅桂枝各一錢炙草三分水二盅棗三枚煎至八分服熟地八兩山茱萸二兩山藥茯苓各三兩丹皮一兩五錢龍骨三錢生研水飛蓮鬚一兩芡實二兩線膠四兩同牡蠣粉炒熟去粉共為末蜜丸梧子大每服四錢空心淡鹽湯下思慮太過心腎虛損白濁夢遺等症菟絲子五兩白茯苓石蓮肉各二兩共為末酒糊丸梧子大每服五十丸淡鹽湯下失精暫睡即泄韭子炒二兩白龍骨四錢共為末每服二錢空心黃酒下虛勞損腎夢遺泄精神方韭子三兩酒浸微炒為末每服二錢空心黃酒下夢遺不止石蓮肉六兩甘草一兩共為末每服二錢空心燈草湯下精滑夢遺公雞肫皮四五個焙乾為末每服一錢空心酒調下三五次必愈壯陽固精蓮鬚石蓮肉各一斤芡實十二兩麥冬四兩另用公豬肚一個入家蓮肉一斤入砂鍋內煮極爛去肚只將蓮肉曬乾同前藥為細末蜜丸梧子大每服百丸空心蓮鬚湯下其效如神便血又六方烏梅二兩柿餅四兩俱去核加水於飯上蒸熟搗爛丸如梧子大每服五錢滾水下二三日吞完數次愈乾柿子燒灰存性為末米飲下二錢黑豆一盞炒焦研末熱酒淋之去豆飲酒以上二方兼治溺血縮砂仁末米飲下熱服二錢神麯濕紙包煨為末每服二三錢滾水調空心服下血危篤者用絲瓜一分槐花半分共為末空心米飲下二錢痔漏門痔漏痔瘡退管枯痔痔漏二方槐花皮硝鳳眼草仁捶碎各一兩入豬大臟內蒸爛每日空心服好黃酒壓之每日衝出漏管一線二十日全愈無名異五錢煅醋淬七次熟糯米糊捻量管之淺深下之膏蓋焙大蚯蚓一條為末黃酒下七日見效但忌房勞百日要緊痔瘡十二方雞蛋留白以青礬七錢明礬三錢灌入用枸杞兜三兩棓子三個煎滾數沸入蛋同煎置桶內熏之多食田螺妙蝸牛一個負殼有角者片麝少許同研磁盞盛之次早取汁頻搽冰片二分青黛三錢元胡粉一兩同研小絹袋盛藥或貼或坐濕即換之鳳尾草煎水洗熊膽五分片一分井花水調雞翎蘸搽枳殼二兩癩蝦蟆草長流水二瓢煎滾熏洗數次魚腥草苦楝根芒硝馬齒莧瓦楞花各一兩煎水熏洗雞蛋黃熬油三錢入輕粉末一兩乳香血竭龍骨各末五分和勻早午夜日搽三次患孔膏蓋大田螺一個挑起靨入片五釐平放俟水出搽之象糞煎水熏洗馬齒莧多食多熏洗妙退管丸二方當歸黃連象齒末各五錢川芎槐花乳香各一錢露峰房一個槐椒樹上者更佳共為末黃蠟二兩熔化為丸桐子大每服五六十丸空心漏蘆湯送下至五日漏眼內退出肉管即剪去再退再剪迨管儘自然從內生肌長肉矣胡黃連一兩穿山甲二兩麻油炙脆石決明煅槐花炒各五錢共為末蜜丸梧桐子大每服一錢空心白滾水下如漏四邊有硬肉突起加蠶繭二十個炒焦為末和入前藥內至重者亦愈此方不用刀針不受痛苦真仙方也枯痔方先用白芨石膏黃連各三錢冰片麝香各三分研末雞蛋清調成膏塗四邊好肉圍護再用紅砒不拘多少放舊瓦上火煅白煙將盡取起枯礬各一錢烏梅燒灰存性二錢白靈藥五分共研極細以手濕津蘸藥搽痔上一日二三次迨臭水出痔即枯七八日全愈重者半月收功神效新增歷驗各方一小兒欠乳或因病後失調漸漸羸瘦或因食積泄瀉不止如瘦弱或揉鼻孔耳眼輕則朋胸重則眼目不見此名疳疾皆由先天不足之故即用此方治之歷經效驗黨參一錢蜜炙焦術一錢茯苓一錢陳皮五分苡仁一錢建蓮子一錢枳殼一錢麥芽一錢神麯一錢三稜五分莪朮五分胡連五分使君子一錢芡實一錢甘草五分以上共研為末用雞蛋一個去清留黃將末藥一錢入蛋內調勻紙裹濕水燒熟開水下日食一個如小兒大者及病深者日食二個亦可以病愈為止一瘋犬傷人每見用斑蝥以毒攻毒亦有誤事者莫如用生白礬三錢為末開水吞下瘋犬之毒化為清水隨小便而出人不知覺恐不放心連服三次永不復發此經歷驗一渣入眼目用好徽墨磨濃以新筆點大眼角其渣即隨淚出一竹籤插入指甲朋內用象牙磨水圍上自然箍出一喉閉用刀括指甲末吹入喉中即愈
