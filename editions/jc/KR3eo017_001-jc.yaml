body:
  text: 上卷達生篇臨產六字真言一曰睡二曰忍痛三曰慢臨盆初覺腹痛先自家拿穩主意要曉得此是人生必然之理極容易之事不必驚慌但看疼一陣不了又疼一連五六陣漸疼漸緊此是要生方可與人說之以便伺候若疼得慢則是試痛只管安眠穩食謂照常眠食也不可亂動此處要著意留心乃是第一關頭不可忽略若認作正產則錯到底矣此時第一要忍痛為主不問是試痛是正產忍住痛照常吃飯睡覺痛得極熟自然易生且試痛與正產亦要疼久看其緊慢方辨得清干萬不可輕易臨盆坐草揉腰擦肚至囑至囑再站時宜站穩坐時宜正坐不可將身左右搖擺須知此處要自家作主他人替不得與自家性命相關與他人毫無干涉謹按醫宗金鑑坐草條云凡產婦坐草最要及時不可太早若兒身未順寧可遲遲寬心以待倘坐草太早非正產之時妄使產母用力往往逼胎不正遂至橫生倒養者有之雖悔無及矣到此時要惜養精神為主能上床安睡閉目養神最好若不能睡暫時起來或扶人緩行或扶桌站立片時痛若少緩仍上床睡總以睡為第一妙法但宜仰睡仰睡恐不安即隨意左右更換側睡亦可使腹中寬舒小兒易於轉動且大人睡下小兒亦睡下轉身更不費力蓋睡所以惜力也惜力以待臨時用之切記切記若胎前喜於安睡或嗜厚味或氣鬱氣滯者臨產略宜行動無論遲早切不可輕易臨盆用力切不可聽穩婆說孩兒頭已在此以致臨盆太早誤盡大事此乃天地自然之理若當其時小兒自會鑽出何須著急惟小兒力薄其轉身時用力已盡及到產門不能即出或亦有之宜稍用力一陣助之則脫然而下矣蓋此時瓜熟蒂落氣血兩分渾身骨節一時具開不暇勉強及至生下即產母亦不知其所以然也或曰大便時亦須用力如何生產不用力不知大便呆物必須人力小兒自會轉動必要待其自轉不但不必用力正切忌用力蓋小兒端坐腹中及至生時垂頭轉身向下腹中窄狹他人有力難助要聽其自家慢慢轉身到產門頭向下腳向上倒懸而出若小兒未曾轉身用力一逼則腳先出以為詫異因美其名曰腳踏蓮花生或轉身未定時用力一逼則橫臥腹中一手先出又名之曰討鹽生即或轉身向下略不條直用力略早亦或左或右偏頂腿骨或不得出不知此等弊病皆因時候未到妄自用力之故奉勸世人萬萬不可用力然亦非全不用力但當用力只一盞茶時耳其餘皆不可亂動者也夫大便未到其時縱用力亦不能出況於人乎或曰何以知此一盞茶時而用力乎曰此時自是不同若小兒果然逼到產門則渾身骨節疏解胸前陷下腰腹重墜異常大小便一時俱急目中金花爆濺真其時矣當於此時臨盆用力一陣母子分張何難之有謹按醫宗金鑑臨盆條云凡兒之生自有其時時至則兒身轉順頭頂正當產門胞漿大來腹重腰痛穀道梴迸產母中指中節或本節跳動此為正產之時方可臨盆用力送兒自順生矣或曰小兒會鑽出之說到底未敢盡信不知古人曾談及否曰古人立言不過撮其大要安能事事悉言之只要後人能體會耳觀瓜熟蒂落四字即知小兒自會鑽出觀揠畝助長四字即知將試痛認作正生之弊矣夫哺雞日足自能啄殼而出豈有催生之神藥穩婆之妙手乎古人謂有遲至三四年而後生者此是不肯鑽出耳既是不肯鑽出誰能強之自要鑽出誰能御之或曰早一時斷乎不可動矣不知遲一時可不妨否曰不妨若果當其時必無不出之理或偶有不出者則是小兒力盡不能得出宜令上床安睡使小兒在腹中亦安睡歇力少刻自然生矣或曰倘兒到產門而大人睡下豈不有礙曰更好蓋小兒向下時大人坐立則小兒倒懸矣豈能久待今大人睡下兒亦睡下有何妨礙又曰倘或悶壞奈何曰他十個月不悶今乃悶乎蓋兒未脫胞者不悶若已出胞不免悶壞急宜產下或兒糞先出產門或穩婆已將手摸見兒發即可知兒之已經脫胞矣或問忍痛過久或亦不妙曰最妙從不聞婦人私產而難者或謂有神佑非也總因胎起於私怕人知覺只得極力忍痛痛到沒奈何時自脫然而出其理甚明有何疑處或曰不宜用力已聞教矣不知先誤用力已致橫生倒產有法治之否曰急令安睡用大劑加味芎歸湯服之將手足緩緩托入再睡一夜自然生矣又曰托之不入奈何曰若肯睡再無托不入之理若到此時仍不許他睡又或動手動腳亂吃藥方吾未如之何也已矣附薛氏治法橫生兒先露臂也令產母正臥以手徐推兒臂下體令其正直復以中指摸其肩勿令臍帶絆系即生逆生兒先露足也令母正臥以手徐推其足仍推兒轉正即生偏生兒頭偏在一邊也亦照前法正其頭即生或兒頭後骨偏在穀道旁徐推近上即生礙產兒頭雖正但不能下蓋因胎轉時臍帶絆肩所致用中指按兒兩肩理脫臍帶即生坐產兒將欲出其母疲倦久坐椅褥抵其生路急令巾帶高懸令母以手攀之輕輕屈足良久兒順即生瀝漿生又名瀝胞生漿流一二日不產或至數日外亦無妨惟安睡候漿流漸少或流盡當自生耳不必驚恐切勿動手又有漿水瀝盡氣機仍阻致胎干難產者此不得聽其自然急用大料四物湯約二三斤以大鍋在房內熬煎使藥氣滿房口鼻吸受以滋益之內服加味芎歸湯一服未效少停片時再進一劑連次服之以生為度此言胎干而兒未脫胞者也若兒已脫胞可令明干穩婆動手取下為妥或問盤腸生是何緣故曰是用力之故蓋因產母平日氣虛及到臨時用力努掙渾身氣血下注以致腸隨兒下一次如此下次路熟又復如此若能等得瓜熟蒂落之時何得有此怪異盤腸生臨產母腸拖出及兒已產下其腸仍有不收者急以芝麻油抹之以防風襲用蓖麻子四十九粒去殼搗爛塗產母頭頂心上其腸自收待腸收上急將頭頂蓖麻洗去勿緩或為風乾不能收者以磨刀水少許溫熱塗潤其腸一面用上好磁石煎湯服之腸即收磁石俗稱吸鐵石須陰陽家用過有驗者乃佳俗以水噀產母面背令其驚而腸收然驚則氣散恐致害戒之盤腸生經過一番則下次懷胎五六個月便須預服補中升提之藥庶臨盆可免或問有一痛便生令人措手不及者此又何也曰此乃正理何足為異蓋胎氣已定母子兩分兒自要出雖欲留之而不可得人人皆是如此皆有此一時只要忍耐得住等候此一時耳或曰穩婆不必用乎曰既有此輩亦不能不用但要我用他不可他用我全憑自家作主不可聽令於彼耳大約此等人多愚蠢不明道理一出門來不問遲早不論生熟便令坐草用力一定說孩兒頭已在此或令揉腰擦肚或手入產門探摸多致損傷總以見他功勞不肯安靜更有一等狡惡之婦藉此居奇射利禍不忍言矣按吳越之間謂之穩婆徽寧之間謂之接生婆江淮間謂之收生婆思收接二字之義因其年老慣熟令他收兒上床接兒落地矣原非要他動手動腳也每當富貴之家預將穩婆留在家中及到臨時少不快利前門後戶接到無數紛紛擾攏吵成一片所謂天下本無事庸人自攏之謹按醫宗金鑑云臨產之家必用收生婆須預先擇老成歷練明白經事之人無故切勿令其光使手法如試水探漿之事但囑令寬心寧耐以待生時可也或問臨時有經驗之藥亦可用否曰不用從前奇方莫過鼠腎兔腦丸今時盛行莫過回生丹非謂其不效而不用也總用不著耳既不用力又不動手又有睡法佐之他自會生何須用藥縱有不順睡為上策按睡固上策然亦略須活動或問服藥有益無損否曰安得無損鼠兔二丸大耗氣而損血回生丹大破血而損氣蓋鼠兔例用香竄之藥產時百脈解散氣血虧虛服此散氣藥兒已出而香未消其損多矣且令毛竅開張招風入內禍不可言回生丹以大黃紅花為君其餘亦多消導之品血已耗而又大破之多致產後發熱等症遺患無窮元氣充實者服之原屬有益無損惟虛弱人不宜用耳都只謂產後失調誰復歸咎於藥按此數方古今稱為神靈奇寶者尚然如此其他可知送藥者本是善心但不知其害耳或問總無可用之藥乎曰有只須加味芎歸湯佛手散二方用之不盡矣蓋胎時全要血足血一足如舟之得水何患不行惟恐產母血少又或胞漿早破以致乾澀耳今二方皆大用芎歸使宿血頓去新血驟生藥味易得隨地皆有且使身體壯健產後無病真正有益無損此皆先賢洞明陰陽之理制此神方以利濟天下後世奈世人貴耳賤目以為平常而不用必求奇怪之藥而後用之只要奇怪不論損益豈不可嘆如娠力旺胎足本不必催生所謂催生者不過助其氣血而利導之耳故加味芎歸湯佛手散二方誠為上藥若氣虛者臨期之獨參湯尤為第一臨盆時再宜預備陳米飲湯倘藥料不及卒辦急須先將此飲之大能安胃接力或問依此言世間總無難產者耶曰偶亦有之或因母太虛胎養不足血氣不完或母病傷寒之後熱毒傷胎又或夫婦同房太多以致欲火傷胎平日過食薑椒煎炒熱物火毒傷胎以及跌撲損傷皆致難產多令胎死腹中除此之外無難產者也又有嚴冬天氣滴水成冰貧家房中火氣微薄以致血寒而凍亦令難產然此亦因臨盆太早去衣久坐之故若擁被安臥待時而產豈有此患兒不哭治法凡生產艱難或天寒孩兒生下不哭或已僵死者切匆剪斷臍帶急用衣物裹兒再用粗紙作捻蘸萊油點火將臍帶燒斷連燒紙捻數十枚不可間斷令燒氣入腹無不醒活又法急令兒坐溫湯中一面以油紙捻燒臍帶一面以溫湯揉其肩臂胸腹湯冷即添換紙捻連連接燒以兒活為度或問臨產時飲食如何曰此時少吃粥飯固妙若不能食全要好飲食調理如雞鴨湯肉湯之類去油澄清或陳米飲頻頻飲之亦能壯助精神人以食為命豈可一日缺乎產房宜忌臨產時宜老成安靜二三人伺候不必多一切親族婦女俱婉言謝卻勿令入房謹按醫宗金鑑驚生條云產房內不可多人人多則語聲喧譁產母之心必驚驚則心氣虛怯至產時多致困乏號口驚生有如此者須急急屏出只留服役一二人使寂靜無嘈雜之聲則母心始安安則其胎亦安靜矣夏日更不宜多人在房熱氣擁盛令產母煩躁發暈其害非小房中宜輕行輕語不宜多話令其得睡為妙第一要勸其放心安靜忍痛歇息切忌在房中大驚小怪咨嗟嘆息皆能令其憂疑擾亂以致誤事房中宜安靜如常不得當面求神許願叫天叫地飲食宜頻頻少與或雞鴨肚肺等清湯更妙穩婆只宜一人入房且合在旁靜坐勿得混鬧房中冬設火盆夏月多貯井水以收熱氣仍頻換之謹按醫宗金鑑產室條云產室之內四時俱要寒溫適中若大熱大寒均不相宜夏月必須清涼勿令炎熱以致產母中暑暈迷冬月必須溫暖勿令寒冷以致血凝難產試痛或問試痛何故曰兒到七八個月手足五官全備已能動彈或母腹中有火或起居不時令兒不安多致大動而痛此等十胎而五不足為異只宜照常穩食安眠一二日自然安靜或痛之不止用安胎藥一二服自止此後近則數日遠則月餘甚至再過三四個月才產人多不知輕易臨盆終日坐立不令睡倒或抱腰擦肚或用手拖或用藥打生生將兒取出母則九死一生兒則十胎九夭慘亦可言世間難產皆此故也蓋胎養不足氣血不全如剖卵出雛裂繭出蛹寧得活乎只說小兒難養誰復根究到此又或有受寒及傷食作痛者亦不可不知或問何以知其試痛曰只看痛法一陣緊一陣者正生也一陣慢一陣或乍緊或乍慢者皆試痛也謹按醫宗金鑑云妊娠月數未足時或腹痛痛定仍如常者此名試胎宜養血以安其胎若月數已足腹痛或作或止腰不痛者此名弄胎不宜輕動二者均非正產之時切勿躁擾疑惑惟宜寧靜以待其時或問傷食受寒何以辨之曰傷食者當臍而痛手按之更痛或臍旁有一硬物寒痛即在臍下綿綿而痛不增不減得熱物而少緩者是也或問試痛亦有或未必多曰甚多曰何以見之曰以今之難產者多也或問將試痛認作正生其害如此倘將正生認作試痛以致過時不亦有害乎曰無害果當其時小兒自會鑽出縱或過時不過落在褲中坐上床上耳有何大害而如此諄諄乎附驗案亟齋居士云前太僕卿霍山張公三君葆華繼夫人年輕體壯孕必八個月而產百苦而下生女必周而夭再孕再產再夭皆同予謂後當生宜相聞明年又八個月坐草三日不下忽憶予言飛輿相召中途逢驅車者云迎其父母作永別比至已夜分矣證之脈未離經人余殘喘穩婆在旁問之曰兒頭已抵產門不得出耳予急命安臥且戒勿擾與安胎藥明晨主人出笑而不言問之曰好了予曰昨言兒頭已抵產門今若何曰不見了大笑而別此後百二十日計十二個足月生男謂予為父今八歲矣始知前此皆生生取出以體壯年輕幸保母命耳在張宅日邑庠程以學邀至其家有寵人坐草二日不下亦與安胎藥越十六日生女太學戴諱時濟與予比鄰契好先是其弟媳一產三男母子俱損一猶在腹今其婢孕其腹膨脝頗患之比產先令安臥與加味芎歸湯每隔半日而產積日半三子俱生康熙四十八年安撫具題陳氏妻生九日夜不下一息尚存聞予有兔腦丸踵門求藥予問之亦曰頭逼產門不得出論令安臥再來取藥強而後去繼與加味芎歸湯明日生下母子兩全一婦產兒手先出不得入穩婆礪刃以須予見惻然急令安臥與大劑芎歸湯徐徐托之手入明早曰下子母皆安右臂紫黑數月而後消按此皆產母用力逼令橫在腹中耳豈有人倒懸十日而尚生者乎保胎保胎以絕欲為第一義其次亦宜節欲蓋寡欲則心清胎氣寧靜不特安胎且易生易育少病而多壽孕後夫婦宜分床睡保胎又宜少勞為妙試看田婦漁婦以及僕婢下人墮胎甚少以勞故也蓋勞則血氣流通筋骨堅固胎在腹中習以為常以後雖有些微閃挫不致壞事倘安逸不動則筋骨柔脆血氣不行略有閃挫隨至墮落然非謂孕後方勞正謂平日不宜安逸耳若平日安逸及孕後方勞適足損胎何筋骨強固之有耶孕已知覺即宜用布一幅六七寸闊長視人肥瘦約纏兩道橫束腰間直至臨盆之時才解去若是試痛仍不宜解此有二妙胎未長成得此則腰膂有力些須閃挫不致動胎其一常令腹中窄狹及到解開則腹中乍寬轉身容易此法吾鄉頗有知者特為廣之此名瘦胎法有孕後睡時須要兩邊換睡不宜偏在一邊使小兒左右利便手足慣熟則產時中道而出不難矣飲食保胎藥餌諸書皆載不必再陳但飲食一道殊未之及茲略言之飲食宜淡泊不宜肥濃宜輕清不宜重濁宜甘平不宜辛熱清蔬白飯自能養之即在貧家須為不乏但富貴人平日肥甘饜足抑令崇儉勢所不堪酌乎其中臚列於左宜食諸物豬肚肺雞鴨鯽魚淡鯗即白鯗淡不傷血白菜海參滑潤養陰菠萊筍少用麻油滑潤解毒腐皮蓮心熟藕山藥芡實諸味總宜潔治多用清湯吹去浮油飲之最佳俱宜白煮忌用油煎此多為膏梁人言之若藜藿之軀正宜得肥甘而潤之何淡泊之有但六七個月後腐皮麻油二物最宜多用不妨日日食之麻油解毒腐皮滑胎且清且補貧富皆宜允為上品積食一二百張則首生如達矣或以麻油拌食更妙胎氣滑者不宜多食但麻油不宜熬熟熬熟則性大熱忌食諸物椒辛熱傷胎姜令兒枝指煎炒偶食不妨不可常吃野味毒異味毒豬肝犬子無聲音驢騾馬肉難產自死物毒豬血損血蟹橫生鱔魚熱傷胎腳魚損胎令兒短頂蝦蟆微毒勿多飲酒濕熱大損胎元勿亂服藥誤服添病又妊娠禁忌一切宰殺凶惡之事不宜看修造興工動土不宜看龜兔俱不可見小產小產者謂胎已墮下之後一切調理並如產後法便產須知云小產不可輕視其調養過於正產十倍可也薛立齋先生云小產重於大產蓋大產如粟熟自脫小產如生採破其皮殼斷其根蒂也但人往往輕視死者多矣凡妊娠之數見墜胎者總由氣血虧損所致或稟質素弱或年力就衰或暴怒勞苦而暗損精氣或色欲過度而盜泄胎元此外如患生他病跌撲築磕飲食不慎舉重遠行之類皆能傷其氣血氣血傷而胎以墜焉且胎懷十月經養各有所主凡遇三五七月份尤易墜胎下次復墜輒亦如期正以傷此一經而再值此經血無所榮故也故凡懼墜胎者必自審其致傷之由而嚴為戒謹凡治墜胎者須察其受傷之經洛而預為栽培此保胎良法也若待臨時恐無及矣婦人氣虛則提攝不固血虛則灌溉不周所以多致小產善保胎者總當專補氣血為主腎以系胞而腰為腎之府故腰痛則墜不可不防又有一法凡易墜胎者得胎一兩月即安睡勿勞直至分娩方已大能固胎最驗小產後數日忽然渾身大熱面紅眼赤口大渴欲飲涼水晝夜不息此血虛之症宜用當歸補血湯以補其血若認作傷寒而用石膏芩連等寒涼之藥則必死矣此下原本附註中有按醫宗金鑑及立齋薛氏小產前後諸症治法竊意症非倉猝猶可醫藥及之者終宜延請名醫審證調治所注非不盡善但恐不明醫理之人辨症疑似誤投方藥害非淺鮮故寧割愛產後產後調理諸書論之詳矣茲不復贅但取一二要緊及所未言者存之以備採擇產後上床宜高枕靠墊勿令睡下膝宜豎起勿伸直隨飲熱童便一盞只宜閉目靜養勿令熟睡恐倦極熟睡血氣上壅因而眩暈然不宜高聲急叫以致驚恐四壁遮風不問有痛無痛俱用熱童便和酒各半每次一杯一日三次三日而止酒亦不宜多若無大病只是如此不必服藥童便性寒傷胃必和酒熱服之產後宜用慄炭燒紅置大銅勺內不時以醋澆沃令其氣達產母鼻中不至血暈臨盆時須預備雖健婦順產亦不可缺每日三四次產後即行之三日止此治產後血暈如神之方也或燒鐵秤錘白石子等物淬醋中並可然不若醋炭之法更為佳矣或有惡血衝心血暈昏悶不省人事者用韭菜一把切碎放有嘴壺內以熱醋一大碗灌入密扎口扶起產母以壺嘴向鼻遠遠熏之虛弱人韭菜不宜用竟將慄炭燒紅淬醋中令醋氣入鼻更佳夏月炭火略遠按醫宗金鑑云產後血暈有因惡露少去內有停瘀上攻迷暈者面唇必赤色宜用佛手散有因去血過多血脫而暈者面唇必白色宜用清魂散生男生女夫命所招蓋百世禋祀以夫家為主與婦人何涉倘或連胎生女此亦人事之常不可在旁咨嗟嘆息令其氣苦曾見有不明公婆愚蠢夫婿將婦抱怨每每致病傷生可笑可恨凡此只宜寬慰為主又有將女溺死者忍心害理後嗣不昌產後各處風俗不同或用紅砂糖或用山楂或用吳茱萸或用胡椒煎水飲之總莫妙於熱酒對童便或腹痛之甚用生化湯一服無不愈者以益母草二兩煎湯代水煎生化湯更效苦草斷不可吃以此物損胃耗血最易墮發益母為穩產後飲食亦各處不同徽俗才上床即與肥雞乾飯吳俗率與齏粥產後胃弱驟與雞飯殊不相宜然其患猶小吳中終日食飯致產後腸胃空虛正宜滋味調養以生氣血轉令食齏食粥習俗移人牢不可破說亦不信予謂必有以此傷生者習焉不察耳及至虛弱發熱咳嗽此大虛也血脫益氣急宜大劑參耆驟補猶可挽回此為血脫大虛者言之非謂產後發熱咳嗽定當峻補其氣也若不善會必致有誤卻又謂之產勞且與滋陰降火以致死而不誤良可嘆也按醫宗金鑑云產後發熱之故非止一端或飲食太過或外感風寒或瘀血停留或亡血陰虛或產時勞乏或三日蒸乳或攻或補或用涼藥正治或用溫藥反治要在臨床細細參考也此下又有產後發熱咳嗽諸症治法亦從刪或曰必如何調理而後可曰粥時吃粥飯時吃飯但須酌量三日內只用雞湯去油澄清未可食雞十日內不食豬肉一月內不可食豬油以其壅塞經絡令血氣不通耳其餘有何忌乎產後切不可冒風寒妄飲食早勞動其時血氣皆虛偶得微疾即為終身之累雞子去瘀生新食之甚宜但要煮極透去殼囫圇煮苟非煮五六個時辰者斷斷不可食不妨自朝至暮食之有益若溏心雞蛋乃是生物斷不可吃將雞蛋調和黃白即煮數刻亦可或和水燉熟以熱酒衝入食之並佳若腸胃滑者忌食鴨蛋不可食或問食物必要去油取其清耶曰然不但要清且更要淡清淡之味本乎天能生精神濁則否矣或曰何以驗之曰產婦宜飲淡酒宜食淡味若飲醇酒食鹹味皆令燒乾無乳此清濁之驗也但不得如吳俗食齏粥矯枉過正耳過飲食則血熱而津液耗多食鹹則血凝而津液傷故均至無乳胎死腹中死胎只宜佛手散服之自下或不下再用平胃散一服加朴硝二三錢能令化下極易耳薛氏云或用童便調下朴硝兩許亦妙古人立法各有精義且經屢驗不吾欺也勿用奇方怪藥致傷母命薛氏云若下後肢體倦怠氣息奄奄用四君子湯為主佐以四物薑桂溫補之若云新產忌參則大誤矣按子死腹中多因驚動太早或跌撲築磕或抱腰太重或頻試探木胞破水盡仍氣阻不下胎涸子死若防之於早亦無此患或問何以知其胎死曰面赤舌青母活子死凡兒活在腹中者產母自覺腹中微微觸動若竟覺得全然不動亦可以知子死也面青舌赤子活母亡面舌俱青且口角兩邊流涎沫者母子俱死況死胎墜脹瘀痛亦與常產不同謹按醫宗金鑑云凡一應傷胎子死腹中者當急下勿使上奔心胸然必驗其舌青面赤腹中脹大腹冷如冰久之口中有穢氣出者方可議下然猶必審其人之虛實寒熱隨宜施之胞衣不下或問胞衣不下何故曰總是臨盆早之故當產之時骨節開張壯者數日不合怯者彌月始合今不待其開張而強出之故胎出而骨眼隨閉以致胞出不及耳或曰聞此極惡之症可以損命有諸曰不妨不必服藥亦不必驚慌若胞衣不出急用粗麻線將臍帶繫住又將臍帶雙摺再系一道以微物墜住再將臍帶剪斷過三五日自痿縮干小而下累用有驗只要與產母說知放心不必驚恐不可聽穩婆妄用手取多有因此而傷生者慎之慎之此一段出寶慶方中其法最妙附醫宗金鑑及薛氏治法胞衣不下或因風冷相干致血凝滯或因下血過多產路枯澀或因惡露入胞衣中脹而不能出腹中脹痛均當急用奪命散或奪命丹或失笑散免致上攻心胸緩則不救若元氣虧損不能送出者腹不脹痛用保生無憂散若胞衣出而昏憒不食用芎歸湯再進十全大補湯若胞衣出而腹脹痛大危仍用奪命丹或失笑散兒既脫胞帶亦墜下故胞在腹中形如仰葉仰則盛聚血水而脹硬難出惟令老成有識穩婆以手指抬其胞底使其血散或以指摸其上口攀開下角使惡露傾瀉則胞自落此亦一法又法用蓖麻子肉一兩細研成膏塗母右腳心俟胞衣下即洗去緩則恐腸亦出或以產婦發入口作嘔令胞衣出此法雖驗但新產作嘔亦所不宜交骨不開用加味芎歸湯服之良久即產無不效者死胎亦下產門不閉初產腫脹或焮痛而不閉者用加味逍遙散若腫消而不閉者用補中益氣加五味子或兼服十全大補湯加五味子切忌寒涼之劑初產傷重腫痛者濃煎甘草湯洗之其腫自平子宮不收亦用十全大補湯及補中益氣湯子宮收後亦宜多服方藥俱列於後乳少乳少者血虛之故或產母去血過多又或產前有病以及貧儉之家僕婢下人產後失於調養血脈枯槁或成年至四十血氣漸衰皆能無乳但服通脈散自有乳若亂用穿山甲王不留行等味往往不效即勉強打通乳汁清薄令兒不壽且損傷氣血產後多病不久便乾反為不美方藥千金保胎丸凡受孕三月而胎墮者雖氣血不足乃中衝脈有傷中衝脈即陽明胃經供應胎孕至此時必須節飲食絕欲戒怒兼服此藥庶免小產之患白朮土炒熟地杜仲各四兩俱薑汁炒當歸續斷俱酒炒阿膠蛤粉炒香附米四制益母草條芩各二兩炒陳皮川芎艾葉各一兩砂仁五錢炒為末棗肉為丸空心每服二錢安胎飲治妊娠血虛氣滯以致胎氣不安或腹微痛或腰痛或飲食不美五六個月宜服數劑人參五分白朮一錢炒陳皮五分甘草三分當歸一錢川芎八分白芍七分炒砂仁六分炒條芩一錢炒紫蘇一錢安胎方七八個月或母腹有火或起居不時致兒擾動腹痛者服安胎藥一二劑即止黃耆蜜炙杜仲薑汁炒茯苓各一錢黃芩錢半生白朮五分甘草二分續斷八分阿膠珠一錢加糯米百粒酒二杯水二杯煎服胸中腹滿加紫蘇陳皮各八分下紅加艾葉地榆各一錢阿膠多加腹痛用急火煎安胎地黃砂仁湯治孕娠胎動欲墮腹痛不可忍及胎漏下血者乾地黃二兩砂仁五錢打碎水煎服極神效芎藭湯即佛手散末者為散切片煎者為湯益母丸治妊娠跌撲築磕胎傷欲墮芎藭湯調服胎墮後惡血瘀滯腹脅脹痛童便酒化服益母草五月五日或六月六日採之陰乾忌鐵器以石命碾為細末煉蜜丸逍遙散治妊娠暴怒房勞傷肝腎致胎動當歸酒洗白芍酒炒白茯苓柴胡各一錢炙草五分白朮一錢土炒銼末水一盞半加薄荷煎服芎歸補中湯治氣血虛而欲產或半產胎未足月痛而欲產本方倍加知母服即止艾葉代姜阿膠蛤粉炒珠川芎五味子杵炒黃耆炙當歸白朮炒人參白芍酒炒杜仲各一錢炒炙草五分佛手散治六七個月後因事跌磕傷胎或子死腹中疼痛不已口噤昏悶或心腹飽滿血上衝心者服之生胎即安死胎即下又治橫生倒產及產後腹痛發熱頭痛逐敗血生新血能除諸疾橫生倒產子死腹中本方加黑馬料豆一合炒焦熱乘熱淬入水中加童便一半煎服少刻再服產後惡露停瘀上攻迷暈急宜服之當歸五錢川芎三錢水七分酒三分煎至七分服加味芎歸湯治一切橫生倒產瀝漿生交骨不開子死腹中等症大劑連服即產極神效當歸一兩川芎七錢龜板一個酥炙研末生男婦人發即名血餘一握瓦焙存性水兩碗煎一碗服後如人行五里許即生芎歸湯即芎藭湯治胞衣出而昏憒不食者加味逍遙散治初次產者產門腫脹或焮痛而不閉者逍遙散加黑山梔生地白茅根紫酒治妊娠腰痛如折黑料豆二合炒焦熟白酒一大碗煎至七分空心服便產神方專治一切產症懷孕不拘月數偶傷胎氣腰痠腹痛甚至見紅勢欲小產者一服即安再服全愈又或臨產交骨不開兒死腹中橫生逆產至五六日不產命在須臾者服此無不神效苟臨月預服三五劑即無難產之患真濟世神方也藥料炮製宜精分兩須准不可增減草率以自誤蘄艾七分醋炒厚朴七分薑汁炒當歸錢半酒炒川芎錢半荊芥穗八分白芍藥錢二分酒炒冬月只用一錢川貝一錢去心淨枳殼六分曲炒生黃耆八分菟絲子一錢四分揀淨酒泡川羌活五分甘草五分加生薑三片水碗半煎八分服預服者空心余皆臨時熱服保生無憂散治胞衣不下腹中不痛由於氣虛不能送出者當歸川芎白芍枳殼木香炙甘草各錢半乳香另研細血餘各五分燒存性另研將當歸川芎等味煎另入乳香血餘和勻服生化湯治產後兒枕痛及惡露不行腹痛等症壯年產婦服此不甚相宜莫若重用佛手散為穩或單服益母草湯亦可當歸六錢川芎四錢乾薑五分炒桃仁五分不可增甘草五分炒水一盅童便一盅煎服以益母草二兩煎湯代水更妙清魂散治產後去血過多血脫而暈面唇白色者澤蘭葉二錢人參二錢川芎五錢荊芥穗一兩炙草二錢共為末用溫酒熱湯各半杯調一匙灌之下咽眼即開氣定即醒失笑散治胞衣不下腹中脹痛及胞衣已下腹仍脹痛又治產後心腹絞痛欲死或不知人事及尋常腹內瘀血積血作痛五靈脂炒蒲黃等分炒為末每服三錢酒煎熱服若瘀血去多元氣血損所致宜服四君子湯加川芎當歸炮姜等味奪命散治胞衣不下腹中脹痛沒藥血竭等分研細末才產下即用童便陳酒各半杯煎一兩沸調下二錢良久再服其惡血自下行便不衝上免生百病奪命丹治胞衣不下腹中脹痛及胞衣已下腹仍脹痛附子五錢炮丹皮一兩乾漆一兩研碎炒令煙盡為細末好醋一升大黃末一兩同熬成膏和藥為丸如桐子大溫酒下五七丸消瘀定痛如神平胃散胎死腹中用佛手散未效照本方加朴硝二三錢水酒各半煎服即下極驗但下後必須大補氣血蒼朮米泔炒厚朴薑汁炒陳皮各三錢甘草錢二分炒通脈散治血衰無乳或乳少生黃耆一兩當歸五錢白芷五錢用七孔豬蹄一對煮湯吹去浮油代水煎藥一大碗服之覆面臥即有乳或未效再一服無不通矣新產無乳者不用豬蹄用半酒半水煎服體壯者加紅花三五分以消瘀血以上諸方較原本略少非敢妄刪也原編及附註中有方雖載而實非萬全無害者茲並不敢錄至小產及產後種種症候苟非猝不及待者終宜延請名醫細辨症候熟按脈理調治使預列條目多載藥方轉恐不明醫理者審症疑似誤投方藥反致有害然即所載之方亦須察病下劑切勿孟浪輕投蓋失之毫釐謬之千里可不慎歟續附治乳岩此病先因乳中一粒大如豆漸漸大如雞蛋七八年後方破破則難治宜急服此藥生蟹殼砂鍋內焙焦為末每服二錢酒調下日日服之不可間斷又方大瓜蔞一個半生半炒酒二盅煎一盅食後服治乳岩已破用荷葉蒂七個燒灰存性研末酒下又方用貝母核桃槅金銀花連翹各三錢酒水煎服治乳癰良方兼治各種大毒用大當歸八錢二分生黃耆五錢金銀花五錢炙甘草一錢八分桔梗一錢五分黃酒二碗煎八分半飢半飽服治孕婦痢疾秘傳妙方用雞蛋一個破一孔如指頭大以銀簪攪勻加入黃丹五分用紙封口在飯上蒸熟食之即愈治難產方及難產之時用米粒大艾火炙右腳小拇指或二三次或五次即下應效不能盡述仙鸞方治產後不論諸般總以此方為主多服更妙白茯苓香附童便炒當歸益母草各五錢川芎烏藥丹皮陳皮炒薑炭白朮各三錢土炒炙甘草五分姜一片大棗二枚去核水二碗煎一碗空心服臨臥服二道照單不可加減治產後血昏不省人事提起頭髮坐定不可眠倒急以燒紅慄炭投入陳醋內對鼻孔熏之自蘇另用當歸六錢川芎三錢荊芥穗炒黑二錢臨服入好酒童便和服神效治孕婦咳嗽方用川貝母去心麩炒黃去麩研末砂糖為丸如芡實子大口中含化一丸極妙治小產不再墮方絲錦二兩入磁罐內封口燒灰存性熱酒空心沖服須於月內服完永不再墮治乳腫奇方蒲公英澤蘭葉金銀花白芷生甘草木瓜各三錢共為末每服二錢水酒各一盅煎服出汗即消治臨產用力努掙以致子宮不收方用麻油五斤煎滾盆盛俟溫令產婦坐盆中一頓飯久再用皂角尖去皮研細末吹入鼻中取嚏立效宮傳三解湯全當歸五錢真川芎五錢車前子二錢五分此方懷胎八九個月連服三劑分娩後去車前子加益母草二錢五分又服三劑不但產婦消除百病即嬰兒亦免胎毒之患矣神效毋忽治妊娠有所傷觸激動胎元腹痛下血妙方砂仁不拘多少帶皮同炒勿令焦黑取仁為末用熱酒調服五分或一錢此藥有安胎導滯易產之功實妊婦之要藥屢試神效人不可忽治產難水下胎干胎滯不生最效滑石散滑石一兩水飛過白蜜香油各半盞先將油蜜慢火熬三四沸掠去末調滑石末頓服外以油調於產婦臍腹上下摩之兒即下其效如神治乳下良方湧泉散王不留行瞿麥麥門冬龍骨各二錢用豬蹄汁一碗酒一杯煎服後以木梳於乳上梳下神效治吹乳腫痛栝蔞散栝蔞一個乳香二錢用酒煎服外用南星末溫湯調敷即愈治婦人赤白帶臍腹疼痛如神白芍藥散白芍二兩炒乾薑五錢共為細末每服三錢空心溫米湯調下治瘀血入胞脹滿難下良方奪命丹附子炮三錢五分乾漆碎之炒盡煙牡丹皮各五錢共為細末另用大黃末五錢以好醋半斤同熬成膏和前藥為丸如桐子大溫酒吞五七丸急服此藥血即消而胎自下催生奇方用炒鹽七錢飛礬三錢共為末滾黃酒一茶盅調下即生不論橫倒死胎即下神效催生神效奇方用黃花苗並花苗二錢半花五錢陰乾研末黃酒送下治難產並胞衣不下方用茅柞皮七錢生甘草三錢水三盅煎一盅溫服即下並治死胎治橫生逆產神效方用屋內燕子土窩大者半個小者一個連泥草並糞用水四五碗煎數沸澄清令產婦飲一碗即轉順生矣附調經種子四方用陳皮半夏生地各二錢歸尾一錢川芎白芍紅花秦艽烏藥各八分香附一錢五分木通三分青皮七分姜引水煎服此方當正行經時連服三劑即成孕又方當歸酒洗一錢吳萸炒一錢白芍酒炒七分半川芎一錢白茯苓七分半大熟地一錢五分香附酒炒一錢五分丹皮玄胡酒炒各七分半陳皮七分半若過期而色又淡者乃血虛有寒也加乾薑炒黑二錢官桂熟艾各二錢若先期色紫者加條芩三錢各藥必須道地藥材分兩切勿增減引用姜三片水二碗煎八九分空心溫服存渣再煎臨臥服經至之日服起一日一服藥盡經止縱未能孕經必對期俟下月經來再服四劑必孕無疑矣極效又方當歸童便浸宿八分廣陳皮七分杜仲鹽水拌炒斷絲八分紅花四分益母草一錢二分淨砂仁八分甘草三分烏藥四分小茴香七分生薑三片引水二盅煎八分空心溫服渣再煎服忌生冷氣惱菜油各物經盡之後不忌每臨經之日先服二劑每月照方用一劑無不受孕者總之藥材必須道地分兩毋得加減方妙又方當歸身酒浸煮爛三兩熟地酒蒸搗爛忌鐵三兩白茯苓炒黃色一兩白芍炒一兩香附先醋煮乾後艾葉蒸三兩白朮土炒二兩玄胡米醋煮透七錢續斷酒浸一宿一兩條芩酒炒一兩丹皮酒洗炒乾七錢益母草取葉尾三兩川芎七錢共為末地上攤一宿去火毒煉蜜為丸如梧桐子大每服五十丸滾白水送下忌生冷胡椒大蒜一月即愈附安胎神方孕婦腹痛腰痠或慣於小產甚至見紅將墮服此皆可保全四方茯苓四兩條芩白朮香附益母各二兩玄胡紅花沒藥各五錢共為末蜜丸梧桐子大每日空心白湯下七丸不宜多服如胎不安一日可服四五次亦不宜過服安後仍一日一服慣於小產者用白朮熟地杜仲各四兩當歸續斷阿膠香附益母黃芩陳皮艾葉各一兩砂仁五錢為末紅棗肉為丸空心服二錢白湯下七八個月者用當歸益母各五錢川芎三錢水煎入童便陳酒各一小杯兌服如腹痛加炒砂仁一錢每日服一劑可保萬全此方即閃跌小產生安死下並催生及產後諸症神效桑寄生五餞生扁柏三錢龍眼肉七個酒二碗空心煎服孕婦心腹痛不可忍二方鹽一撮炒紅淬酒中服之即止鯉魚酒煮極爛食之孕婦水腫喘悶足趾出水香附陳皮甘草烏藥天仙藤微炒等分焙為末每服三錢姜三片木瓜紫蘇各三分煎水調空心服每日三次腫消即愈妊娠浮腫羌活蘿蔔子同炒香只取羌活為末每服三錢初日一劑次日二劑三日三劑立愈保產神效四方當歸一兩川芎五錢車前子焙黃研末三錢藥煎熟衝車前末服冬月加肉桂當歸一兩川芎五錢益母草六錢朴硝三錢煎熟候溫一氣服下少頃即產或死胎亦下好酒麻油白蜜雞蛋白童便各半杯入碗和勻隔湯滾數沸溫服難產用陳螃蟹殼焙黃為末臨產時服一錢以砂糖好酒調下大凡催生之藥不宜用早恐是轉胎猶遲數日方生者總以胞破時服之穩妥胞衣不下二方鳳仙子炒黃為末熱黃酒調服一錢立下以產婦自己髮尾銜之近喉使噁心嘔噦即下產後遍身疼痛手足拘攣等症神方當歸白朮黃耆牛膝獨活乾薑炮殭蠶官桂甘草桑寄生各等分為末每服四錢滾水下立愈治產後十三症千金不易之仙方也牡丹湯當歸川芎熟地澤蘭葉香附玄胡益母草各錢五分水煎服產婦冒風加防風天麻血暈加五靈脂炒黑荊芥穗發熱加人參炮薑黃耆心膈迷悶加陳皮枳殼砂仁血崩加地榆炒黑山梔丹皮咳嗽加杏仁桑皮桔梗死血不行加紅花桃仁枳實飲食不進加山楂麥芽脾胃作脹加白朮茯苓蒼朮厚朴陳皮砂仁枳實心神恍惚加茯神遠志胞衣不下加朴硝求嗣生人之道始於求子求子之法莫先調經每見婦人之無子者其經必或前或後或多或少或將行作痛或行後亦痛或紫或黑或淡或凝種種不調不調則氣血乖爭不能成孕求子之道婦人要經調男子要神足又寡欲清心為上策寡欲則不妄交合積氣儲精待時而動故能有子是以寡欲則神完不惟多子抑亦多壽男子陽精微薄則雖遇血海虛靜流而不能直射子宮多不成胎蓋因平時嗜欲不節施泄太多宜補精元兼用靜工存養無令火動候陽精充實依時而合一舉而成矣凡婦人受胎必須經調經脈既調如期而至行經有二日半淨者有三日淨者若血氣旺至六七日方淨者鮮紅者未淨淺淡者太過惟以敗血淨新血生如金色者為佳期此時月經方絕金水才生子宮正開乃受精結胎之候妙合太和之時逢一日三日五日交會成男生子必壽而賢明二日四日六日交會者成女過此佳期則子宮閉而不受胎矣施瀉無益也陰陽交合避忌凡男女交會當避丙丁日及弦望晦朔大風大雨大霧大寒大暑大雷電大霹靂天地晦冥日月薄蝕虹霓地動則損人神不吉損男百倍令女得病有子必癲癡頑愚瘖啞聾瞶攣跛盲眇多病短壽不孝不仁又日月星辰火光之下神廟佛寺之中井灶圊廁之側塚墓屍柩之旁皆所不可夫交合如法則有福德大智善人降托胎中仍令性行調順家道日隆若不如法則薄福愚癡惡人來托胎中令性行凶險不成家道曰否禍福之應有如影響可不戒哉並將應戒日期開列於後每月朔望日廿八日庚申日本命日母難日祀神祭先日並前一日春三月甲乙日驚蟄日春分日並前三日春社日二月初八日夏三月丙丁日四月初八日十四日十六日夏至日並前一日五月初五六七十五六七甘五六七日為九毒日七月初七日秋分日秋社日八月十八日冬至日並前一日後十日冬至以後庚辛日十一月廿五日臘月初三日初八日廿四五日除夕三伏日凡節氣口四月純陽十月純陰俱宜節欲社口受胎生子白毛以上各日期犯之而損夫妻者受胎而夭男女者且小兒痘症之輕重由於種子之夕夜氣清明天花必輕兒不受累或風雨雷電痘發必重每多險症是知禍福有出來矣世之為父兄者每於子弟新婚時諄諄訓飭能知檢點不獨偕老百年益且克昌厥後矣轉女為男法懷孕三月名曰始胎血脈不流象形而變故服藥方求轉令生男也始覺有孕以斧置孕床下勿令知之一定生男若不信待雞抱卵時以斧置窠下出時盡是雄雞可驗石雄黃一兩用紅綢作袋盛之帶於孕婦左腰間萱花名宜男草懷孕時佩之取夫頭髮手足指甲置孕婦臥席下勿令知拔雄雞長尾毛三根置孕婦席下亦勿令知以上數則理之所無事之或有姑錄之以備望子心切者之一助云耳保嬰篇總論夫痘由胎毒而生也終身只出一次可知本乎胎毒其痘症之有順逆則總在外感之有輕重或染時氣或感風寒或因驚嚇或傳染他兒痘氣而全不關胎毒之故曾有雙生兄弟一痘密而殤一痘稀而順豈同胎而異毒耶且極北之人從不出痘及到中土依然出痘豈一身又前後異毒耶此可見痘之發現胥由外感也蓋陰陽會合非火不成胎有火即有毒毒藏小兒腎府人人皆同初無輕重之異但深藏必待外感而發外感重則發必重感輕則發亦輕若外感無則藏於中而永永不發彼夫極北不出痘者地氣凝結所謂外無所感而永藏於中定一至中土邪陽蒸郁而即發也雙生兄弟而痘分順逆者所謂外感有重輕發亦因之重輕而總非所藏之毒有輕重也豈可執其偏端謂順逆盡由胎毒哉噫世之論者竟以胎毒為言莫解外感為患但知俟其自出而為後時之補救不肯乘其未出而為先事之綢繆遂使赤子無辜多罹夭枉矣惟其然痘之發必因外感以病引病所以自出之症順吉少而凶險多也古有種痘之法相傳宋真宗時峨嵋山神人所創實具百發百中之功洵為盡善盡美之術推原其理蓋出痘感於得病之後而種痘必於無病之先出痘或遭天時寒暑之不齊而種痘必擇天氣融合之美候內無他病之夾雜外有善苗為引導此其化凶險為順吉事出萬全豈不顯然明白哉奈世人不察因循自誤者有之或不知其法之善而不敢種或明知其術之妙而不暇種一旦自出危痘追悔無及是因循之誤也懲噎廢食者有之依法種痘萬無險症或千百之中不免偶損一二總因本家調理不善或種師審兒未詳所致世人不知自咎反將以種為戒而甘聽其自出殞命此與偶見一人噎而欲禁眾人食者何異須知既種尚不免者其自出尤必死矣此理甚明人何不悟棄置神方坐觀夭札良可痛憫今謹輯種痘萬全要法列左有兒之家宜深信速行保全嬰赤焉痘苗苗即他兒之痘痂也種痘者並無別藥全賴乎此以為胎毒之引導關係最重制苗之法擇他兒極順之痘不論種出者自出者只取狀元痘痂而已其出稀少其粒尖圓其色紅潤其漿充滿其所落之痂蒼蠟光澤肥大厚實者取貯磁瓶內密蓋置潔淨清涼之處觸穢遇熱便壞春秋之痂一月尚可種冬痂四五十日尚可種日久則氣薄無力下苗之法視可種之兒用苗數粒在有底小管筒內舂細用棉花作棗核樣拭津嚏醮滿痘屑塞鼻孔內男左女右又法小兒一歲者用苗二三粒三四歲者四五粒將苗在磁盅內用柳木碾細滴水調勻要以不燥不濕為度春秋溫用冬熱用將新綿攤極薄小片裹所調痘屑成棗核樣以線縛定留線寸許長則剪去納入鼻孔亦分男左女右此名水苗種亦穩當可從苗既塞鼻必使人勤勤看守勿令小兒用手拈弄或被嚏出急將苗仍塞鼻內不可稍緩下苗以後以六個時辰為度然後取出如溫暖早取數刻如寒冷多留數刻取出之後其苗氣漸次而入傳遍五臟至七日始發熱發熱三日而後見點見點三日而出齊出齊一日而灌漿漿足三日而回漿結痂大功告成其他種法有以綿拭痘漿塞鼻者名痘漿種此捏破痘粒取漿令彼兒泄氣害事最是殘忍又有服痘兒貼身染漿衣者名痘衣種又有以痘痂屑干吹入鼻者名旱苗種俱不驗三者斷不可從種師秘法以盡於此種痘之家宜備知之既種後將發熱時小兒頸項內男左女右必發一小塊狀如痰核乃毒氣結聚於此故痘發必稀謂之痘母此塊不必治待落痂則塊自漸消矣又有驚痘於發熱時小兒忽然驚搐手足踡不語目上視有片時即平復者有發熱一二個時辰者有發一次者有發兩次者總屬不妨不可擾動叫喚待其自平不必服藥須預對痘家說明天時種痘之時以天氣融和為主正二三八九十月為上嚴寒酷暑均非所宜必不得已則四七十一十二月尚可種若五六月斷不可種也又如春應溫而反寒秋宜涼而反熱冬應寒而反溫此皆天時不正遇此不可種擇吉下苗須擇吉日忌每月十一日人神在鼻柱十五日人神在遍身調理種痘以調理為第一要緊事務調處之法不外調寒暖慎飲食防驚嚇而已調寒暖之法當酌量天時相度小兒體氣加減其衣裳常令小兒手掌溫和手掌冷即系受寒身不煩躁煩躁即過熱並忌一切擁爐向火乘涼風弄冷水等事寒暖不調必有險悶稠密之患戒之慎飲食之法吮乳之兒不多乳不闕乳乳母宜戒食一切鮮發辛熱炙煿生冷之物能食之兒勿吃辛熱炙煿黏硬生冷勿過飽過飽則停食壅滯胃絡恐成悶痘亦勿過飢過飢恐氣虛而痘陷鮮發之物下苗後即宜戒至發熱時可略吃見點一二日又宜戒漿來時又宜大吃漿足時仍舊戒直至一月後方可照常無忌至肥膩及辛熱炙煿黏硬生冷等物則始終不可吃按忌食鮮發者恐其助毒為虐致痘稠密也忌食肥膩等物者恐其滯脈絡助痰火壞脾胃致痘險也他若清平溫軟之葷物原不妨略吃以滋助小兒精神種師云見點後二三朝可服蔥頭山楂湯此法亦通但兒或瘦怯本無風寒食積者不宜服防驚嚇之法在小兒起居刻刻照管雖勿過嚴亦戒驕縱以上諸法須在未種一月前預先調理停當若能在一年半載前調理更妙然後延師下苗直調理至落痂後再一個月方萬全種所以勝於自出萬倍者全在乎此此係本家之事切須用心勿貽自誤審兒下苗時須細審兒之可種不可種種師固當細審本家尤宜詳察蓋有膽大種師只求肥利不顧重輕而冒險種之者貽害非淺全在自己詳察自己做主也凡種師遇小兒之父母行事疏忽不知調理不聽禁忌不信醫藥過於溺愛驕縱者斷不可與他種若兒形氣充實精神強健臟腑調順脈息和平內無痰熱食積驚嚇所傷外無風寒燥火暑濕所感並耳朵後筋紋淡紅色清爽細縷者此無病之兒可種又若面部紅潤精采明亮透達印堂山根年壽及眼下口角無青暗之色兩目有神氣精光身無疥癬之瘡者此可種若兒血氣不足脾胃虛弱精神疲倦脈不和平或失乳之後或病後元氣未復並耳朵後筋紋紫粗糊頭不清爽者此有病之兒不可種又若面色青白或黧黑痿黃無喜色無精采兩目闇昧無神身有疥癬素有驚癇之症者此不可種又小兒耳後筋紋紅紫及耳尻不熱中指獨冷者即可知其痘將自出亦不可種凡小兒將及周歲即宜相天時審體氣及早種痘恐遲則偶值外感必將自出禁忌種痘房中須潔淨忌衝犯喜明亮勿幽暗並諸禁忌一一遵守則吉少有疏忽必致敗事忌一切不謹勿怒罵歌樂勿對兒梳頭搔癢勿暴動帷被生風倘值烈風雷雨大宜安定勿使兒驚忌一切穢氣如婦人經候氣狐臭氣勞汗氣燒頭髮魚骨氣燭燼硫黃柴煙蔥蒜醉酒等氣忌客人往來並不許僧道師巫孝人入室須專人守門常燒闢穢香闢穢香用南蒼朮半斤用生大黃四兩共切細片爐中不住燒之可避偶爾不正之氣信苗種痘發熱以前小兒面部上忽出顆粒似痘名曰信苗此痘之將發毒氣之標也信苗色紅而軟聽之自消若紅紫堅硬有如魚目者急以銀針挑破上以二聖散則無虞二聖散用明雄黃紫草等分研細末用油胭脂調下補種下苗後踚十四日而不發熱者可相天時再為補種下苗後或疏於照管小兒捏出鼻中之苗使氣泄無力不發者有之或因痘苗日久氣薄不發者有之或小兒五內壯實不受苗氣艱於傳入不發者有之或因胎毒深藏雖苗氣傳至不能引出不發者有之總當候至十四日為度自出種痘必五臟傳遍始能發熱鼻者肺之外竅也種痘以苗塞鼻中其氣發傳於肺肺主皮毛肺傳於心心主血脈心傳於脾脾主肌肉脾傳於肝肝主筋肝傳於腎腎主骨痘毒藏骨髓之內感苗氣而發其毒自骨髓盡達於筋腎臟之毒解矣自筋盡達於肌肉肝臟之毒解矣自肌肉盡達於血脈脾臟之毒解矣自血脈盡達於皮毛心臟之毒解矣自皮毛盡達於顆粒肺臟之毒解矣苗氣必歷五臟層遞而入內毒亦必歷五臟而出此傳送之次序也故下苗後七日而發熱者常也或有至九日十一日十四日而發熱者傳送遲之故亦不為奇若發熱於五日以前者此時苗氣尚未傳入毒何由發必是種後小兒適逢外感而發是自出之痘非關苗氣引出者當愈加小心保護治法種痘乃乘兒無病引毒達表事本平常何須治法但恐調理偶疏或致仍夾他病故治法亦宜講究種痘倘有應治之處當悉照自出之治法以治之痘苗既下種師之事已畢倘所發之症不無疑慮宜兼請別位明醫療治切勿專仗種師一人之力自出之痘傳染時氣有佳有不佳且或值天時乖戾往往危險若種者所用痘苗必選極美又擇天時慎調理故終究穩當也至於治法則有何分別上種痘萬全要法十條毓蘭居士謹遵御纂醫宗金鑑及歷代名醫緒論而輯至精至當有兒之家宜及早遵行切勿輕視而或窮鄉僻壤罕遇種師或兒有癬疥未便即種謹附異傳經驗稀痘奇方於後蓖麻子三十粒去殼衣揀肥大者硃砂一錢揀明透者麝香五釐揀真淨者先將硃砂麝香研極細末後入蓖麻子共研成膏於五月五日午時擦小兒頭頂心前心背心兩手心兩腳心兩臂彎兩腳彎兩脅共十三處俱要搽到不可缺少搽如錢大勿使藥有餘剩搽完不可洗動聽其自落本年搽過出痘數粒次年端午再搽出痘三五粒又次年端午再搽永不出痘如未過周歲小兒於七月七日九月九日依法搽之更妙男女皆同傳方之家不出天花已十三世矣又方立春前一月將雞蛋七個用麻布袋盛上用線掛好浸屎桶內糞取稠的一月取出蛋勿水洗埋土內三日須避人走立春日早用磁罐煮三枚須糖心令易吃諸食宜少進恐飽不能食總期三日內吃完兒小者一二枚亦可食過三年重者必稀輕者不出按痘皆父母遺毒今用屎浸消後天之毒用土埋培先天之氣又當立春回陽之候服之毒消痘稀必然之理也慎勿以穢而忽之又方凡嬰兒無論男女用肥大光潔川楝子一歲至三歲者七個臼內搗爛水三碗新砂鍋煎濃傾入盆內避風處將新稀白布一方蘸水自頭至足遍身洗擦不留余空仍將布拭乾避風一刻四五歲者用川楝子九個水五碗六七歲者用川楝子十五個水七碗八歲至十歲川楝大二十個水九碗十一歲至十五歲川楝子三十個水十五碗照前煎濃擦洗搗藥忌鐵器非但不出痘且免瘡癤若不信或手或足留一處倘出時必聚一塊此係神效仙方新安吳春山先生作宦時三子俱患痘殤齋戒虔詣城隍廟夢神授此方後娶妾連生三子即照此洗擦俱長成深感神功刊布庚辰年吳義豐在楚地見痘疫流行刊刻布送救活嬰兒無算洗浴日期須擇七個除日洗七次如五月至八月初止內有七個除日俱在熱天更妙又方取絲瓜不老不嫩才不可食者懸檐下風乾只將近蒂者二三寸許瓦上炙存性為細末每一錢配水飛硃砂三分每服五分用黑砂糖調服量兒大小如初生時一服最妙三歲內者二服三歲外者可三四服能使多者稀稀者無此古方也試過百兒無不稀少一兒服之最多竟至不出稀痘神效二方金銀花微炒研白糖調不住服久之可免金銀花一斤甘草四兩熬白糖加入和勻成膏每日早晚一二匙解一切毒時行痘症預服可解大黑豆赤小豆綠豆各一盞甘草一兩細切入罐煮極爛連豆和湯與兒食之七日乃止痘疹出不快觀音柳用枝葉四五錢冬即枝梗煎湯服立出乃速痘麻疹之神藥也痘不入目牛蒡子搗爛洗兒囪門則痘不入目此預防最妙之法眼內生痘二方刺黑狗耳上血一滴入眼即除防風穀精草白茨藜去刺炒研等分為末食後服二錢米泔水調下痘瘡痛楚恐傷目者浮萍陰乾每服三錢為末羊肝半個竹刀切碎搗爛和水蒸熟以汁調藥食遠服數次清茶漱口痛輕者一服全愈已傷目者十服必痊痘後目障菊花蛤粉望月砂草決明穀精草各一兩蟬退三錢共為末收貯每服以雞肝一具不沾生水竹刀破開入藥一錢箬葉裹蒸食頻食自愈餘毒上攻遂成內障蛇退一條洗淨焙燥天花粉等分為末羊肝破開入藥在內米泔水煮熟食之痘不起荔枝橄欖各一個連皮核搗爛同煎服紫草茸五分煎服如力能加人參二三分煮更妙倒靨色黑狗蠅七枚夏月身上取冬月耳中鑷取焙乾為末酒調下移時即紅潤如常紅活忽然黑陷人牙以酒浸濕草紙包煅末酒下立效出痘遇險白鴿子煮湯服多食鴿肉亦妙無漿不起三方真山羊血三分甜酒娘調服濕濕蟲數個擂酒灌之牛耳蝨焙研酒送下痘後餘毒馬齒莧汁生綠豆赤小豆石膏等分為末豬油熬膏塗之痘出五六日不長不膿或癢塌當歸芍藥黃耆川芎白朮茯苓木通紫草防風各三分糯米二百顆水煎乳母同服痘瘡潰爛蕎麥細粉麻油調搽若重者以絹包粉遍撲再重者以粉裝褥墊睡痘毒磨新瓦二片合羯羊糞於內文武火炙煙盡為度存性研末麻油調敷痘後傷風渾身癢二方取絲水洗澡白蘿蔔嚼爛擦之痘入目生翳膜白菊花穀精草綠豆粉等分共為末每服一錢用柿餅一個米泔水一杯同煎候水乾只吃柿餅每日三次七日即愈痘後眼翳三方蒙花酒浸蜜蒸曬乾蟲退去翅足洗淨穀精草望月砂各五錢共為末或豬羊肝水洗去筋每兩用藥一錢蒸服忌生冷煎炒發物黃鱔尾剪一分血滴翳上閉目一時拭去換鱔再滴每一日三次翳重者七次蛇退一條洗淨焙乾天花粉等分為末以羊子肝破開入藥苧麻縛定米泔水煮熟食陷入不起色黑欲絕者穿山甲洗淨炒脆為末每服五分紫蘇煎湯調下紅斑黑陷痘疔不起小靈丹用雄黃硃砂各二錢乳香沒藥各錢半麝香三分大蟾蜍即蝦蟆取心肝瓦上焙乾五錢共為細末取豬心血雞冠血為丸如皂子大每服一丸身無大熱黃酒下熱甚不飲酒者以紫草燈心湯下此解毒發痘起死回生之神藥也服之不效則無救矣紅痘忽黑陷煩噪喘犯如見神鬼者痘宜急治遲觸毒氣入臟難難救無價散人牙貓牙犬牙各燒灰存性等分為末如五六歲者則服三四分大小量加增減用好熱酒調下治痘疔法長大紫黑者即是疔毒把住痘不起發最宜急治浸胭脂濃水研雄黃末塗之立時即紅活神效蒲公英搗膏塗之甘蔗渣曬乾真香油點燈燒成灰以津液調勻用銀簪挑破點上立效如加珍珠末油胭脂調搽更效痘至七八日忽然變黑收入腹內遍體抓破吭喘死在旦夕者服此從新另發立可回生當歸生地白芍升麻紅花白芷牛膝麻黃川芎水酒各半煎服連進二三服立愈如有象糞微炒周歲兒加三錢大者或三五錢嗽喘二方痘嗽用白附子杏仁磨水服即止切不可用二陳湯痘喘取白花地丁煎水服止喘如神痘喘咽喉腫痛二方牛蒡子二錢桔梗一錢甘草七分水煎服如身已涼汗不止當歸五錢黃耆棗仁炒各三錢水煎服立止痘潰爛二方潰爛膿水取蓋屋多年陳草洗焙為末搽之即痘後不收膿搽之亦效枇杷葉煎湯洗亦效痘爛生蛆取嫩柳葉鋪席上睡蛆盡出而愈也麻疹初起發熱惡寒咳嗽頭暈呵笑流涕等症神方升麻甘葛白芍各一錢甘草五分紫蘇三分蔥白三個生薑以解肌切忌大汗此方斑不紅者亦宜麻疹既出而又沒者以為風寒所沖毒氣內攻若不急治必凶鼠黏子四錢荊芥二錢生甘草一錢防風五分水煎加犀角三分尤妙已出覆沒或出不盡哭啼不止十分危急死在須臾或下痢腹痛等症二仙湯黃芩白芍藥生用水煎溫服如神悶疹二方西河柳為末水調服四錢立效如有鮮者煎五六錢服更妙櫻桃核四十九粒蔥頭一個水煎服疹發不出頭臉腫脹氣喘命危此法治之神效大蔥白數十根連須搗爛放在大銅盆內盆上用木架架之以大被單罩蓋停當大人抱定小兒睡在上面用滾水衝入蔥盆內令熱氣熏蒸復添滾水一二次俟稍溫氣通即抱出仍要遮蓋不可露風直待汗乾即生愈矣但抱起時避風要緊分開頂門有紅筋紅瘰者挑破即出治肺火夜間喘嗽久不止者薏仁杏仁各一錢山藥二錢竹葉二十片梨三片水煎當茶吃每日數次愈麻疹七日以前喘急神方升麻八分桑皮梔子黃芩各三分桔梗分半天冬七分知母分半姜一片水煎服愈疹後喘急天冬甘草各七分檳榔山梔桔梗各分半大黃六分黃芩三分桑皮三分半知母四分水煎不拘時溫服小兒門初生二便不通臍氣時啼口疳臍風口舌生瘡馬牙痐瘡夜啼吐蛔蟲睡臥自汗痄腮兩頤生核不吮乳名曰鎖丹毒風瘡疥癬赤遊風月蝕瘡耳前後生瘡白禿癩瘡眉叢生瘡眼生白點膿耳軟癤疳疾五疳諸疾面黃肌瘦腹大筋青等症驚風急驚風慢驚風小兒猝死小兒螳螂子方鎮驚丸斷乳方後續附各症四十方初生二便不通令女人以熱水漱淨口嗍兒前後心及臍下數次即通臍氣時啼二方烏藥小茴俱鹽水炒陳皮甘草生白芍勾藤各等分加青皮少許酒炒水煎服雞肫內皮去淨屎勿沾水納薄薑片於內煨灱研末燈心湯下口疳先用青布包手指蘸甘草水洗淨口內白皮再以雄黃硼砂等分研末敥之自愈臍風二方艾葉燒存性填滿臍中以綢絹包定大蒜切片貼臍上用艾灸之若口有艾氣愈此方兼治撮口風口舌生瘡二方桑白中汁抹之立愈生黃柏末塗之亦妙馬牙二方百草霜雄雞屎和勻搽之以銀針挑破白硬處取地蝨焙研末和麻油調搽痐瘡四方雞蛋三個煮熟去白用黃炒去油搽數次即愈川椒銀花茄樹子松樹根煎水常洗黃丹陀僧甘石各等分為末子松樹皮豬油調勻紙包點燃滴油調搽艾葉銀花甘草皂角莊黃白芷煎水洗夜啼四方抱雞婆置熱水盆內兩翅拍水一陣取雞出乘熱水將兒洗浴燈花五個為末塗乳頭上令兒吮之牽牛子研末水調敷兒臍上畫驢子一個以腳朝上倒貼兒所睡床頭吐蛔蟲陳皮半夏薑汁炒白茯苓各一錢苦楝根皮二錢甘草五分生薑一小片引水煎服睡臥自汗二方舊爛蒲扇燒灰存性為末每服三餞以溫熱酒下紅棗浮麥同煎濃汁服亦妙痄腮二方青果核醋磨塗之如無青果時即橄欖核亦可赤小豆七粒為末醋調敷之兩頤生核不吮乳名曰鎖銀針挑破口內腮上硬核連筋取出外面患上炙艾一灸丹毒二方三稜針照圓圈針破出紫血即愈豬油切薄片腋下夾熱貼之冷則頻易多貼神效風瘡疥癬二方苦參五錢胡麻仁蔓荊子牛蒡子白蒺藜去刺皆炒何首烏威靈仙荊芥穗各三錢石菖蒲干菊花各二錢共為細末酒糊丸每服二三錢竹葉燈心湯下以藁本煎湯洗澡洗衣久之自愈赤遊風千腳泥一兩烘乾珍珠三分同研細末茶油調敷月蝕瘡黃連研末麻油調搽耳前後生瘡黃柏枯礬螵蛸滑石各等分為末搽之如瘡乾用豬油調搽白禿癩瘡石灰窯內流結石油四兩百草霜雄黃各一兩膽礬六錢榆樹皮三錢輕粉一錢共為末豬膽汁調剃頭後搽之眉叢生瘡二方穿山甲前膊者佳炙焦為末入輕粉少許清油調搽蒜瓣燒灰燈心調搽眼生白點桑汁用燈心點之即退膿耳二方蛇退燒黑存性研末吹之海螵蛸枯礬各一錢麝香一分干胭脂燒存性五分共為末不時吹之大人耳皆可用軟癤三方大枳殼切去少半去內瓤磨平口塗麥糊合癤上膿血自出大芋頭搗爛敷之亦佳菊葉芙蓉葉共搗汁不時搽之疳疾五疳諸疾面黃肌瘦腹大筋青等症四方蝦蟆去頭足皮腸酒洗淨用紅糖拌砂仁末填入肚內縫定濕紙包煨服穀精草為末二錢雞肝一付酒拌末於肝上隨飯蒸熟去藥取雞肝服之常用此方即目盲將死者亦可活蔥椒煮蝦蟆常食亦效大石燕一對須一雌一雄重一兩者更妙入銀罐內上下炭火煅紅七醋淬九次明硃砂三錢研水飛淨紅曲一兩揀淨三味共研末周歲者每服三分大小量加增減糖拌且無藥氣即和於糖果粥飯中亦可服按此方名紅燕散乃消疳化積之神劑也驚風三方白頸大麴鱔一條切兩截跳急者急驚用跳慢者慢驚用加麝香一分搗爛納於臍上外用膏藥蓋緊自愈以白頸曲鱔煎湯灌之蘇葉丹皮薄荷葉每樣五分不可缺再加一錢灶心土七個蔥頭一分麝一個香蕈七樣全照分稱准研成末燒酒調餅貼臍上真是回生神妙藥急驚風痰涎壅塞咽喉其響如潮名曰涎