以半夏末吹其鼻皂角末綿裹塞其糞門須臾出水即活用艾灸臍中即活將梯乘其人倒掛用鹽塞滿鼻填滿臍中鹽化即醒以鴨血灌之即活凍死二方天寒凍死或冬月落水微有氣者脫去原衣隨解活人熱衣包暖用米炒熱或灶灰熱者亦可布包徐熨心上更迭換之身暖眼開以溫酒或薑湯清粥灌之即活若先烘火則死矣用雄黃焰硝等分為末點兩眼角壓死跌死二方心微溫者急扶起坐將手提其發以半夏末吹入鼻中以生薑汁同茶油調勻灌之少蘇則服散血藥或以童便灌之更妙取東向桃柳枝各七寸煎湯灌之魔死或夢魘死二方不可近前呼叫但唾其面不醒即咬腳根及拇指略移動臥處徐徐喚之原無燈不可用燈照待少醒以皂角末吹鼻得嚏即醒雄雞冠血滴口中亦可凡五絕急取韭菜搗汁灌鼻中或加皂角末麝香同灌更快捷生半夏末冷水為丸如豆大塞鼻心溫者即一日可活凡猝死總以生半夏末吹鼻中最妙即產後昏死皆可治凡涎潮於心卒然倒地急扶入暖室正坐以醋湯熏之即醒凡中風中暑中毒中惡乾霍亂一切速暴之症總以薑汁和童便服殺死五方殺傷未透膜者用乳香沒藥各一塊如皂角子大研細童便半盞好酒半盞同煎通口服外以烏賊魚骨為末敷或以花蕊石敷之更妙附花蕊石散方乳香沒藥羌活紫蘇細辛草烏厚朴白芷降香當歸蘇木檀香龍骨南星輕粉各二錢麝香三分蛇含石二錢煅童便淬三次花蕊石五錢煅童便淬七次共研極細用蔥湯洗過傷處以散敥之軟綿紙蓋包一日一換傷而氣未絕者急用蔥白炒熱遍敷傷處繼而呻吟易熱蔥再敷俟蘇定以真三七研末用口沫調敷漸愈生半夏末帶血敷上暫止痛漸生肌或韭菜汁拌陳石灰陰乾敥之倘出血不止水調幹腳泥於傷處四圍敷之若傷頭面敷頸傷手敷臂傷足敷腿截住其血令不來潮其傷口仍用膏散敷之杖傷三方杖後急飲熱童便以免血攻心用熱豆腐鋪傷處熱蒸腐紫頻易之傷轉淡血色為止內服白芨末米飲下韭菜滾水泡鋪貼傷處肉潰爛膿二方甘石赤石研末豬油和藥熬膏攤紙炙熱加冰片少許貼之一日周一換先用淨油內湯洗後用鹽調陳茶洗吊揚塵大黃末桐油燈盞熬膏貼之括膿去毒極妙夾傷熱童便一盆浸足冷則燒石淬熱浸至童便上浮白油則傷盡出肥皂搗爛雞蛋清和勻罨傷處裹紮勿動內服人中白煅一兩乳香沒藥各二錢牛膝二錢木耳燒存性自然銅煅各二錢共為末再用牛膝煎酒調服三五錢夾傷並治手足折傷三方舊蒲扇把子七個燒過存性砂糖一杯調服威靈仙熟地木瓜各五錢生地牛膝各六錢枸杞七錢全當歸三錢公豬爪陳酒二瓶滾水煎服腳魚三四斤者佳活煮爛儘量食飽湯浸足骨殼搗碎敷之暴雷震死急用蚯蚓搗爛覆臍上可活觀音救苦神膏此方系唐天師葉真人誠心濟世往求大士賜以良方日以三十六天罡攻之於外以菩提水一杯應之於內萬病皆除矣菩提水即甘草湯也久病七日即愈新病三日即痊危病不待日者作丸如豆大每服七粒滾水送下即蘇真神方也原書眉批此膏若遇毒重可作丸吞服搓丸須在水中搓至綠豆大體壯者可服五六丸弱者只可服三粒吞後常吃葷腥庶不嘈人再囑此膏有甘遂在內與甘草相反吞丸切不可飲甘草湯用大黃甘遂萆麻子各二兩當歸兩半木鱉子三稜生地各一兩川烏黃柏大戟巴豆肉桂麻黃皂角白芷羌活枳實各八錢香附芫花天花粉桃仁厚朴檳榔杏仁細辛全蠍五倍穿山甲獨活元參防風各七錢黃連蛇退各五錢蜈蚣十條香油六斤入藥浸五日煎去渣至滴水成珠加密陀僧四兩飛丹二斤四兩熬至不老不嫩收貯埋地下三日以去火毒隨病攤貼但熬膏最宜虔誠須設香案供奉大士更妙切忌汙穢婦人雞犬之類衝破偏正頭風貼患處或卷條塞鼻眼目赤腫將耳上角刺出血貼上脹膜倒睫各貼患處咽喉雙單娥貼患處仍將膏含化立愈頭面虛腫風火牙痛貼患處九種心胸肚腹疼痛各貼患處甚者作丸吞溫水送中風以箸撬開口作丸溫水吞下瘧疾貼臍上甚者作丸熱酒送痢疾貼胃口紅痢用龍眼連殼核七枚打碎煎湯送丸白痢用荔枝七枚打碎煎湯送赤白痢兼用勞瘵有蟲貼夾脊尾骨肚臍飲甘草湯七日勞蟲盡死咳嗽吐痰貼前後心不可吞服鼓脹貼臍下丹田服丸亦可噎膈貼胃口服丸痰火哮喘貼前後心服丸大小便閉貼肚臍服丸傷寒蔥薑湯服一汗而愈六七日不大便者服下即愈婦人赤白帶下貼丹田難產及胞衣不下作丸溫酒服血塊痞積貼患處若肚健者作丸服一日便瀉出矣小兒驚風作條塞鼻作丸服疳症貼臍腫毒惡瘡貼患處服丸臁瘡即十年不愈者貼之每日洗換十日全愈痔漏內卷條外貼便血腸紅夢遺白濁貼肚臍吐血鼻血貼兩腳心俱飲甘草湯普濟丹黃豆七斗芝麻三斗水淘過即蒸不可久浸恐去元氣蒸過即曬曬乾去殼再蒸三蒸三曬搗為丸如核桃大每服一丸可保三日不飢不餓丹芝麻三升紅棗去核三升糯米三升焙乾共磨為末密丸彈子大每服一丸清水下皆可濟生丹芝麻一斗微炒黃豆糯米各一斗水淘蒸曬熟地十斤黃耆炙山藥炒各五斤白朮三斤共為末紅棗十斤去皮核煮熟搗爛煉蜜為丸每丸重五錢白湯下避難丸黑豆一升去皮貫仲甘草各一兩茯苓蒼朮砂仁銼碎各五錢水五大碗同熬至水盡去藥取豆搗泥丸芡實子大陰乾收貯每嚼一丸任食草木無毒甘甜忌食葷腥菜果熱湯水感冒瘧痢等症白朮蒼朮陳皮厚朴各三兩甘草蒺藜丹參各兩半共為末蜜丸龍眼大口噙薑湯下暑天涼水冬天滾湯皆可下此方另加老米三升淘淨候乾炒香磨成粉和藥為丸服即可充飢又能醫病昔浙省奇荒曾有好善之士施此全活無數因名為廣濟丹辟穀丹大黑豆五斗水淘淨蒸兩遍去皮火麻子三斗水浸一宿蒸三遍令開口取仁各搗為末後合搗成團如拳大大甑蒸戌時蒸至子時止寅時出甑午時曬乾為末干服以飽為度不許食一切他物第一頓七日不飢第二頓四十九日不飢第三頓三百日不飢第四頓二千四百日不飢如再服永遠不飢從此身體強健面貌紅潤如遇口渴煎麻子仁飲若欲如舊飲食用冬葵子仁三合研末煎湯冷服解下前物如金色再用飲食並無所損箭簇槍炮鉛子入肉五方蜣螂二三個巴豆四五粒共搗如泥敷傷處先止痛後作癢少頃即出矣花蕊石火煅七次研末敷傷四周自出干莧菜與砂糖搗塗陳臘肉去皮骨入象牙末人指甲末各二錢半厚敷即出銃子入肉以水銀灌入傷處其鉛即化水仍從傷處隨水銀出治竹木入肉神效八方萆麻子搗塗痛止即出螻蛄搗敷蠐螬研敷生慄嚼敷馬齒莧搗砂糖調敷酸棗仁燒灰水調敷象牙刮末水調敷鹿角燒灰水調敷保養門保精神說攝生之要保齒法眼昏生翳美容顏法聰明湯陽春白雪糕八仙藕粉養元粉仙炒麵觀音茶天仙面地黃醴甘露酒延齡酒補虛益腎百果酒二仙酒八仙酒歸圓酒圓椹酒白沙丹黑豆丸豬肚丸三妙種子丸蜂窠散桑烏丸長生不老丹保真廣嗣丹昔人云先寢食而後針藥又云謹攝以當藥益信慎寒暑節飲食謹嗜欲養性情保身即可卻病也因並列飲食起居數十方或慎重於無病將病之時或調理於病後病中之際俾老者得以頤養天和而少者漸登仁壽庶幾勿藥有喜共躋春臺矣保精神說精者神之本氣者神之主形者神之宅故神太用則歇精太損則竭氣太勞則絕是以人之生者神也形之託者氣也若氣衰則形耗而欲長生者未之聞也夫有者因無而生焉形須神而立焉有者無之館形者神之宅也倘不全宅以安生修身以養神則不免氣散歸空遊魂為變方之於燭燭盡則火不居譬之於堤堤壞則水立涸矣神者魂也魄者陰也神能服氣形能食味氣清則神爽形勞則氣濁服氣者千百不死故身飛於天食味者千百不生故形歸於地人之死也魂歸於天魄落於泉水火分散各歸本源生則同體死則相關飛沉各異稟之自然譬如一根之木以火焚之煙則上升灰則下沉自然之理也夫神者生化之本精氣萬物之體全其形則氣生養其精則神全神全則形全形全則長存矣然則精神固可不知保乎攝生之要春宜早臥早起披髮廣步以使志生夏宜晏臥早起無好燕遊使志無怒而氣得泄秋宜早臥早起與雞俱興使心志安寧收斂神氣冬宜早臥晏起必待日光使志若伏去寒就溫無泄皮膚志則動氣氣清則神暢氣濁則神昏氣亂則神勞氣衰則神去起早則神自爽起晏則神不清夫久視則傷神久臥則傷氣久立則傷骨久行則傷筋久坐則傷血醉臥不可當風露便急不可強隱忍冷水不可洗面醉飽不可行房夜溺不可朝西北日光不可久凝視上床先脫左足下床先穿左足則吉朝暮無妨叩齒立秋日不可澡星月下不可裸形凡服藥之時不可食胡荽蒜生菜豬犬油膩魚膾腥臊生冷酸臭等物保齒法每日清晨睡起時叩齒三十六遍以舌攪牙齦上下俟津液滿口方嚥下三次乃止凡遇大小解閉口咬牙解畢開口永無齒患眼昏生翳每天早睡起趺坐凝息閉目將眼輪轉十四次緊閉少時忽然大睜行久之後內障外翳自退然切忌色欲及寫細字美容顏法每日臨起靜坐閉目存神以兩手搓熱拂面七次再以漱津塗面搓拂數次行之半月則容顏光澤矣聰明湯治不善記而多忘者白茯苓遠志肉甘草水泡石菖蒲去毛一寸上各三兩制後共為極細末每日用三五錢煎湯當茶食後方服一日不拘數次久久服之能日誦千言陽春白雪糕補養老年幼弱並治虛勞泄瀉腹脹咳嗽等症真健脾養胃之上品也白茯苓山藥芡實蓮肉各四兩為末陳倉米糯米各半升為末白砂糖半斤先將藥米為末和勻布袋裝入甑內蒸極熟再入砂糖揉勻或作餅或作糕曬乾男婦老小任意食之水調亦可八仙藕粉常服固可並治一切虛勞雜症白藕粉白茯苓白扁豆炒蓮肉川貝母山藥白蜜各等分共研細末滾水調不拘時服臨服加人乳少許更妙養元粉實脾養胃如神糯米一升水浸一宿瀝乾慢火炒熟山藥炒芡實炒各三兩川椒去目及閉口者炒出汗研末二錢共為末腹飢食加白砂糖調滾水多少隨意食之七仙炒麵治諸虛百損勞嗽痰喘茯苓蓮肉芡實各一斤共為細末小米一升炒磨末紅棗四斤煮熟去皮核蜜白砂糖各一斤七味和勻收貯隨意滾水沖服干吃即是炒麵老幼已病未病諸可用大補有益也觀音茶最補虛損並治咳嗽神效黑芝麻微炒藕粉山藥微炒黏黃米麵炒白糖各一斤蓮肉微炒八兩共為末隨意滾水沖服天仙面補虛損治泄瀉及飲食少進糯米一升水浸一夜瀝乾慢火炒令極熟加山藥二十兩炒共研細末收貯每日清晨加白糖調多少隨意服加椒末少許更妙大能滋補或有精寒不能成孕者久服亦孕矣地黃醴治男女精血不足營衛不充等症宜制此常服大地黃蒸略曬八兩沉香一錢枸杞蒸曬乾四兩浸燒酒十斤不必煮泡十日外即可飲但飲時不可過量酒完尚可浸二道甘露酒治諸虛百損且其味甚美可以常服圓眼肉紅棗肉葡萄桃仁當歸枸杞杜仲熟地各二兩浸燒酒十斤延齡酒補虛益腎枸杞八兩圓眼肉四兩當歸三兩白朮炒一兩黑豆半斤絹袋盛浸無灰酒十五斤七日可用百果酒香櫞佛手各二兩核桃肉圓眼肉蓮肉橘餅各半斤柏子仁四兩松子仁三兩紅棗二十兩黑糖三斤乾燒酒五十斤浸二仙酒安神悅顏圓眼肉一斤桂花蕊四兩砂糖八兩浸燒酒一罈愈久愈妙八仙酒補脾胃壯筋骨和顏悅色令人生子當歸牛膝生地杜仲枸杞五加皮各二兩土茯苓四兩打碎浸酒三十斤歸圓酒補脾養胃祛風明目菊花當歸各半斤枸杞一斤圓眼肉三斤燒酒三十斤南酒二十斤泡二十一日飲圓椹酒大補諸虛桑椹龍眼肉各四兩燒酒十斤浸飲白沙丹補陰陽安臟腑勞傷癱瘓並皆治之熟地三兩茴香烏藥蒼朮茯苓山藥各二兩為末酒糊丸梧子大每服三十丸空心酒下黑豆丸延年補腎強筋健步功效非常菟絲蒺藜枸杞故紙川椒牛膝杜仲當歸魚鰾青鹽各半斤圓大黑豆一斗入黃酒十斤煮熟曬乾共為細末煉蜜為丸桐子大每服三錢白水下豬肚丸固精養血瘦者能肥其理莫測白朮飯上蒸炒牡蠣鍛透水飛洗淨煮爛共搗如泥和丸桐子大每服三錢白湯下三妙種子丸沙苑蒺藜水淘淨曬乾炒香當歸酒浸各八兩魚鰾蛤粉炒焦一斤共為末煉蜜丸如桐子大每服二錢空心淡鹽湯下蜂窠散治陽痿不舉神效蜂房燒灰悶熄為末新汲水服二錢陰寒痿弱將末敷陽上即起桑烏丸降火清目補腎健步奇方何首烏一斤用料豆一升合煮曬乾桑葉二斤陳酒拌透曬乾側柏葉二斤曬乾女貞子半斤芝麻半斤共研末煉蜜為丸桐子大每服三錢空心白湯下長生不老丹滋陰健脾補腎養血順暢三焦培補五臟烏鬚髮固牙齒其功不能盡述何首烏五斤用青鹽三兩黑豆一升水酒各半用首烏煮乾去筋白茯苓赤茯苓當歸扁豆芡實薏仁天冬麥冬知母枸杞菟絲子蓮肉牛膝冬青子黑芝麻覆盆子巴戟各八兩共為末煉蜜為丸每服三錢空心白滾湯下此方有力者量加人參更妙保真廣嗣丹治腎氣虛寒不能生育培補元陽神效不能盡述鹿角膠魚膠各炒成珠熟地各三兩山藥茯苓山萸五味杜仲遠志益智仁川楝子巴戟故紙胡蘆巴各二兩沉香另為末五錢共為細末和勻肉蓯蓉水洗淨肉二兩好酒煮爛搗如糊煉蜜為丸桐子大每服五六十丸空心溫酒下雜錄門驅蚊法治蝨發蝨魚蝨牛馬蝨治壁蝨驅蠅驅鼠法捕蛇法治衣服生蝨治白蟻禁蛙鳴治小犬吠聲遠行不飢食蒜不臭米久不生蟲煮豬婆肉血汙衣油汙衣漆汙衣黃泥汙衣膏藥汙衣糞汙衣酒醋醬汙衣防氈貨生蟲紙絹書畫墨汙衣洗白衣垢洗舊葛衣去凌綢墨跡及扇上墨種松方梅花脯點斑竹方視雲霄中物禽獸昆蟲所畏空中鶴至浮水出沒山行稱謂預知防禍治臭蟲烏雲髻抹面如童顏雕刻竹器竹木刺傷書免蛀傷手指凍裂洗淨墨跡磁轉逃奴後復補附九方驅蚊法五方端午日取浮萍曬乾為末樟腦拌勻夜焚少許蚊化為水鱉甲夜明砂同為末熏之七醋浸浮萍一宿陰乾燒煙麻葉燒煙鰻骨燒煙治蝨銀珠紙燒煙燻之發蝨水銀入紅棗內飯上蒸熟揉勻置之發中一二日即淨魚蝨號桐梗松枝羊糞置塘內皆可治若羊糞更闢獺生馬蝨柏葉樹皮野澤蘭共燒煙燻之仍用蓑衣覆牛背治壁蝨即臭蟲七方木香和巴豆燒煙燻之紅浮萍燒煙燻之但煙傷衣帳羊屎燒煙燻之羊油青布條點照蛇屎紙包置床四角則不至羊毛置草鋪下蟹殼燒煙燻之驅蠅二方藁本煎湯浸抹布抹桌及器皿蠅自不來陳茶末燒煙燻之驅鼠法黑犬血和蟹殼燒之荷葉梗塞鼠穴鼠自去捕蛇二方雞糞於土風燒之蛇自出荔枝桂圓核同燒煙蛇即醉軟不動捕而放之於野切勿傷其生治衣服生蝨白果三十枚水銀三分野菊花三錢同研細攪漿漿衣衣不生蝨治白蚊養竹雞一對蟻聞共叫即化為水並可去一切蟲蝨禁蛙鳴二方野菊花連根葉順風撒去牛膽塗紙置水中皆不鳴治小犬吠聲以香油少許灌入鼻中則夜不鳴運行不飢芝麻一升糯米一升共研末紅棗三斤煎熟和丸如彈子大每食以水化一丸可保一日不飢食蒜不臭二方食畢飲醋一口則不臭或食芝麻少許尤妙米久不生蟲蟹殼放米內則日久不生蟲煮豬婆肉二方煮熟後取出以冷水浸冷再煮即爛以山楂同煮亦妙血汙衣二方白蘿蔔擦之即去若生瘡膿血用牛皮膠洗之即退本身小便洗血亦淨油汙衣五方用水調面塗之干後自去蘿蔔湯洗之滑石末隔紙熨之自退桐油以豆渣擦之煙油以瓜子仁嚼碎洗之漆汙衣二方先用油洗再以溫湯略擺然後嚼杏仁接洗又擺則無跡先以麻油洗去再以皂角洗之黃泥汙衣先以生薑擦過用水擺之即淨膏藥汙衣二方酸泔水浸二三日即去白酒腳煎滾將膏藥上微浸三五次用手搓之清水擺下糞汙衣埋土中半日取出洗之則不臭酒醋醬汙衣藕擦之則無跡防氈貨生蟲以生芋擦之則耐久不蟲紙絹書畫墨汙衣燈草浸水洗之自退洗白衣垢三方赤小豆煎湯洗茶子去殼洗蘿蔔湯洗洗舊葛衣二方葛衣年久色黑用臭酸泔水浸二三日取出清水擺淨如新清水揉梅葉洗經夏不變色葛忌木盆洗則變黑去綾綢墨跡及扇上墨三方用紙襯於下以收墨上用白蘿蔔擦之金扇墨用醬油描濕再以清水洗之紙扇墨先以水潤濕後用炭灰敥上筆蘸清水洗種松方去中間大根惟留四旁鬚根則長成偃蓋梅花脯橄欖與梨同食作梅花香故宋名士謂之梅花脯點斑竹方硼砂五分明礬一錢銅青一錢研細醋調隨意點畫視雲霄中物取鸚鵡眼珠水和人乳滴入眼中即能仰視禽獸昆蟲所畏龍畏鐵熊畏鹽獺畏酒蚺畏菖鱉畏蔥燕畏艾魚畏橄欖又畏芭蕉蜘蛛畏蕪青驢馬之駒畏爐灰雞雛畏柳薪龜畏桑薪河豚畏復菼狐畏鵲頭蚊畏蟃骨海馬畏糟魂羊畏躑躅即杜鵑白蟻畏竹雞聲空中鶴至樺皮即弓上用者合真降香焚之雲中有鶴即至浮水出沒象胸前小橫骨燒灰入酒服之任入江河無傷山行稱謂預知防禍山中遇子日自稱社君者系鼠稱神人者服翼丑日稱書生者牛寅日稱虞吏者虎稱當路君者狼稱令長者老貍卯日稱丈人者兔稱東王父者麋稱西王母者鹿辰日稱西師者龍稱河泊者魚稱無腸公子者蟹巳日稱寡人者社中蛇稱時君者龜午日稱三公者馬稱仙人者老樹未日稱主人者羊稱吏者獐申日稱人君者猴稱九卿者猿酉日稱將軍者雞稱捕賊雉戌日稱人姓者犬稱成陽公者狐亥日稱婦人者金玉稱神者豬但能預知其名逢之不能為害治臭蟲羊骨一個秦菽半斤共入火盆內同鋸木屑燒煙門窗閉緊勿令煙出其蟲自死白芷蒼朮雄黃番木鱉等分為末糊丸指頭大微火燒煙燻之即化為殼九頭獅子草取回放床四角每角放四五朵置草荐下任其自干臭蟲自絕烏雲髻蔓荊子千金草山奈甘松牡丹皮白芨各等分用油核桃一個去核搗爛好菜油入內煎濃去渣不時塗之則發如烏雲矣抹面如童顏方硃砂干胭脂各二錢宮粉三錢川芎一錢潮腦五錢烏梅五個去核共為細末臨睡時津唾調面上天明以溫水洗去至六七日面如仙童雕刻竹器石灰同煮後雕刻如切藕竹木刺傷牛膝嚼爛敷上即出書免蠹傷芸香及葉同藏書中無蠹手指凍裂白芨磨塗患處即愈洗淨墨跡五龍神水洗清油默唸七遍磁轉逃奴用磁石三兩包逃人舊衣鞋襪內懸井中或梁上即回睡夢遺屎桑螵蛸末酒調臨臥先服數夜即愈不論大小迴風絕火以硃紅綢或大紅衣迎火掛之五色花蛋蕎麥灰石灰等分醃蛋則變色紅花蓮蓬灰醃之則通紅斟酒不盈沒藥擦盞口上酒不溢壁上點燈樟腦同燒酒畫之引竹過牆埋死貓狗則竹過牆禁竹過牆皂角刺埋土中則不過藏飯不酸生莧菜鋪在飯上則不酸鐵器不鏽以香油調水粉擦之怪疾二十六條怪疾異常怪證異於常患之病故謂之怪疾肉癥肉癥者思肉不已食訖復思白馬尿三升空心飲當吐肉不吐者死本草酒癥一人病心痛此人好酒初飲二三杯必奔走三五十次其酒稍散方復飲至前量至明朝嘔出黃水數口夜變魚腥臭六七日始安戴人張子和也以藥吐之乃吐蟲一條青黃色長六七寸口目鼻俱全狀如蛇醃干以視人乃酒癥也綱目一男自幼喜飲酒日飲二三升無酒叫呼不絕全不進食日就瘦弱家中設策令人用手巾縛住手足卻取生酒一罈於口邊打開其酒氣衝入口中病者必欲就飲堅不與之須臾口中忽吐物一塊直下壇中以物蓋覆猛火燒滾約幹一半卻開取之其物如豬肝狀約三兩重周圍有小孔如鐵眼不可數計棄之於江自後雖滴酒不能飲矣得效發癥一人有飲油五升以來方始快意常吃則安不飲則病此是發入胃化為蟲雄黃半兩為末水調服蟲自出投沸油中棄之江中病即愈得效一道人心腹煩滿彌二歲甄立言診曰腹有蟲誤食發而然令餌雄黃一劑少頃吐一蛇無目燒之有發氣乃愈入門一人患腰痛牽心每發輒氣欲絕眾以為肉癥徐文伯視之曰此發癥也以油投之即吐物如發稍引之長三尺頭已成蛇能動掛門上滴盡惟一發而已入門一婦人病胸膈不利口流涎沫自言嚥下胃中常有雷聲心膈微痛時復發昏針灸藥餌三載不愈戴人用痰藥一湧而出雪白蟲一條長五六寸有口鼻牙齒走於涎中病者惡而斷之中有白髮一莖此發瘕也子和雞癥褚澄為吳郡太守李道唸到郡澄見謂曰汝有重病答曰舊有冷病今五年矣澄為診曰汝病非冷非熱當是食白瀹雞子過多所致令取蒜一升煮食之乃吐一物如升大有涎裹之開看則是雞雛翅羽爪距悉俱能行走澄曰此未盡令更服藥又吐如曏者十三頭而安醫說蛟龍瘕春秋二時龍帶精入芹菜中人偶食之得病發則似瘕面色青黃腹滿痛不可忍名為蛟龍病取飴糖二三升日兩度服吐出如蜥蠍三五枚即差蛟龍子生在芹菜中食之入腹變成龍子用餳糖粳米杏仁乳餅煮粥食之三升日三服吐出蛟龍子有兩頭可驗仲景蛇瘕華陀行道見車載一人病噎塞食不下呻吟陀曰餅店家蒜齏大酢三升飲之當自痊如言服之果吐大蛇一枚而愈本草一人常飢吞食則下至胸即便吐出醫作噎膈治不效任度曰此因食蛇肉不消而致斯病但揣心腹上有蛇形也視之果然遂用硝黃合而服之微利則愈入門鱉瘕人食鱉肉不消成瘕伏在心下揣見頭足時時轉動作痛白馬尿飲之即消昔有人與奴俱得此病奴先死剖其腹得鱉置庭中有乘白馬客來看其馬放尿鱉上即便消化其主知其奇效取飲之即愈白雌雞一隻勿與食令飢過一宿明日以豬脂煎飯喂之取其屎熬干為末白湯調下一錢日三服須消盡乃止好了殺雞食之種杏蛤精疾一人患腳跟腫痛諸醫莫識徐之才曰蛤精疾也由乘船入海垂腳水中而得為剖出二蛤而愈入門眼見五色物一人酒色過度眼見空中有五色物稍近變成一美婦人亭亭而立徐之才曰此色欲過多太虛所致乃以補藥飲之數服而愈入門視物倒置一人因大醉極吐熟睡至次早眼中視物皆倒置醫者診其脈左關浮促遂用瓜蒂藜蘆平旦吐之視物如常蓋傷酒吐時上焦反復致倒膽府故視物皆倒法當復吐以正其膽則自愈入門四肢堅如石寒熱不止經日後四肢堅如石以物擊之一似鐘磬聲日漸瘦弱吳茱萸木香等分銼煎湯飲之自愈得效化生蝦魚口鼻腥臭水流以碗盛之有鐵色蝦魚如粳米大走躍不住以手捉即化為水此肉壞也任意餐食雞肉自愈得效腹如鐵石腹中如鐵石臍中水出旋變作蟲行之狀繞身咂啄癢痛難忍撥掃不盡用濃煎蒼朮湯浴之以蒼朮末入麝香少許水調服之而痊得效遍身波浪聲遍身忽然渾渾如波浪聲癢不可忍搔之血出謂之氣奔人參苦杖青鹽細辛各一兩銼作四貼水煎服即愈得效身出斑毛眼赤鼻張大喘渾身出斑毛發如銅鐵乃目中熱毒氣結於下焦白礬滑石各一兩為末水煎服不往乃安得效十指斷壞手十指節斷壞惟自筋連其節內蟲出如燈心長數尺余遍身綠色名曰血餘赤茯苓胡黃連煎湯飲之自愈得效有蟲如蟹有蟲如蟹走於皮下作聲如大兒啼為筋骨肉之化雷丸雄黃各一兩為末糝於豬肉片火上炙熟食之自安肉出如錐遍身忽然肉出如錐既癢且痛不能飲食此名血窒若不速治潰而膿