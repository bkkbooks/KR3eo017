body:
  text: 下卷中症門中風中風痰壅口眼喎斜半身不遂浮萍一粒丹中寒中暑溺臍法梅蘇丸中濕骨節疼痛風寒濕氣疼痛中痰痛中痰一切痰飲暖胃除痰消滯進食痰壅胸膈吃煙中毒煤煙毒鹽滷砒霜水莽蠱毒信毒中風不省人事牙關緊閉生南星生半夏皂角子各等分研末吹鼻內得嚏則吉無嚏則危白礬鹽花等分為末擦牙即開荊芥穗炒為末酒調服二錢獨活一兩酒一碗煎至半碗炒大豆一撮投入溫服連服一二次愈中風痰壅三方陳石灰為末三錢水一碗煎至六分去渣澄清灌服香油一杯薑汁半杯調勻灌下膽礬一錢木香三錢麝香一分蔥汁調灌口眼喎斜三方獨活白芷薄荷各等分為末蜜丸彈子大每服一丸清茶調下萆麻子去殼研爛右歪塗左左歪塗右改正速洗新石灰醋調左歪塗右右歪塗左正即洗去半身不遂五方細辛白芷川烏草烏川芎白朮當歸各一兩蒼朮牛膝天麻鰾膠穿山甲酒浸微炒各五錢硃砂雄黃各三錢共為末每服錢半夜睡時以熱黃酒送下蓋暖出微汗三四服即見效以愈為止不必多服避風寒忌發物蒼朮十兩川椒四兩老酒五斤共貯瓶內用箬扎封固安米在上以重湯煮至箬上米熱為度初飲盡醉蓋暖出一身臭汗即愈白鳳仙花收取陰乾浸老酒煮熟去花飲酒半月全愈川烏草烏附子俱用生薑煮透各三兩川椒二兩研末酒糊為丸如綠豆大每服九丸酒送下每日早午晚三次空心服一料可治數人數年疲軟不能行者用松葉半斤切細酒三碗煮二碗乘熱服出汗即愈未愈再服必愈浮萍一粒丹此丹專治三十六種風左癱右瘓口眼喎斜偏正頭風跌撲腳氣等症服過百粒即為全人若些小風症服二三十丸足矣紫背浮萍於七月七日採取曬乾研末煉蜜為丸如彈子大每服一丸溫酒化下汗出即愈曬浮萍法鋪萍於篩內以盆貯水置篩於盆上仍不沾水曬烈日中一時即干若下無水吸雖數日亦不幹中寒卒倒昏迷不省人事先用熱酒薑汁各半盞灌之稍醒即進藥中暑四方倉卒中暑飲童便數杯加薑汁兌服更妙井花水調砂糖灌之小青葉擂汁和砂糖灌亦妙大蒜四五個去皮取道路上乾淨熱土一小撮共搗爛新汲水和勻去渣灌之辰砂六一散冷水調服溺臍法凡中暑昏倒氣欲絕者切不可移冷地灌冷水得冷必死無救移置陰地急取路上熱土捏圓圈圍於肚臍上對圈內溺小便暖氣透氣即醒然後再用清暑方藥梅蘇丸清上焦熱止渴生津烏梅肉二兩水浸搗爛葛粉六錢白檀炒鹽各一錢蘇葉三錢白糖一斤搗和煉蜜為丸大小聽便隨意噙化長途攜帶更妙中濕骨節疼痛五方當歸桂心元胡天麻各等分煎服一二劑愈五加皮六兩白朮四兩首烏生地當歸各三兩虎脛骨羊油酥炙杜仲各二兩用好酒二十斤煮三炷香乘熱加高燒酒三斤窨一七隨量飲之忌發物飲時忌暈腥名八仙酒疼痛不能轉側白朮炒一兩好酒煎溫服一切走注氣痛木香溫水磨濃汁入熱酒服白虎歷節風痛足不能履地木通二兩煎汁服之一時許遍身發癢或發紅點勿懼上下出汗即愈風寒濕氣疼痛四方拈痛膏用廣膠三兩生薑蔥白各半斤搗汁乳香沒藥各錢半入銅器內火上熬化移在滾湯內燉以箸攪勻入花椒末少許再攪勻稍冷攤貼患處以鞋底烘熱徐徐熨之馬齒莧二斤五加皮半斤蒼朮四兩共搗爛以水煎湯洗澡畢即服熱薑湯兩三碗避風取汗立時止痛再服方藥調理蒼耳子鳳仙花共煎湯洗澡亦妙甘草威靈仙各一斤切片用水二擔將藥煎五六滾入大缸內用板凳坐於其中周圍以席圍定熏之待水溫方浸洗令渾身汗透淋漓自愈凡洗澡時及洗畢總宜禁風要緊中痰一切痰飲陳皮白茯苓各一錢半夏二錢甘草五分姜三片水煎溫服暖胃除痰消滯進食肉蔻二個半夏五錢木香二錢五分共為末空心滾湯下痰壅胸膈五方梨汁一盅薑汁白蜜各半盅薄荷三兩研細末和勻重湯煮十餘沸任意服降痰如奔馬痰暈火動生薑汁半杯和砂糖二匙調勻滾湯下消痰潤肺貝母研末和砂糖為丸含之止嗽痰火天花一片梨汁薑汁蘿蔔汁竹瀝各一盅次第拌曬為末每服一錢好茶下停痰半夏一兩白礬五錢薑汁糊丸薑湯下吃煙中毒二方廣糖食一二片即解新溺尿服之亦解煤煙毒四方先將其人臥於地上令聞土氣即解並搗蘿蔔汁灌之立蘇新汲水調砂糖灌之醃鹹菜水灌下立愈凡房緊密不透風者煤火炭火皆能閉氣開門即醒如不醒以涼水徐灌之自愈鹽滷二方生豆腐漿灌下鵝翎絞喉令吐白洋糖四兩湯調灌下砒霜毒十方其症煩躁如狂其腹絞痛頭旋欲吐面青黑四肢冷或悶絕微溫命在須臾綠豆半斤擂汁去渣新汲水調通口服真靛花二錢分二服以井花水濃調服細茶葉冬青搗汁頻灌無名異五錢研末冷水調服楊梅樹皮煎湯二三杯服之黑鉛磨水灌之禾稈燒灰新汲水淋汁瀝清冷服一碗毒即下生油灌之令吐熱鴨血灌之立解熱羊血灌之水莽毒綠豆漿黑公鴨血白蠟末合調服後多食綠豆湯忌酒面青鹽蠱毒此淫術雲貴兩廣有之暗藏飲食中害人毒在上服升麻以吐之毒在下服鬱金以下之或兩藥並服不吐即下信梁上燕子窩用井水四大碗同放桶內攪勻以夏布瀝淨取泥水速灌二三碗不吐再服吐盡即醒傷寒門傷寒傷寒結胸傷寒發狂諸症寒熱咳嗽身痛頭暈感冒汗後煩熱口渴大小便閉頭疼發熱口乾鼻涕四治湯諸葛行軍散神仙粥治感冒傷寒傷寒六方生薑二兩打碎蔥白十根好黃酒二碗煎至一碗半乘熱服蓋暖出汗即愈夏月蔥姜減半冬月加炒黑豆二合同煎服尤妙生薑一兩打碎蔥白連須七根茶葉一撮黑糖三錢同煎熱服蓋被出汗即愈如無汗以蔥薑湯催之紫蘇二錢核桃五個生薑三片蔥白三寸水煎熱服出汗即解夏月去蔥不用芝麻炒焦二兩研末熱黃酒沖服蓋暖出汗為度杏仁胡椒各三十一粒共搗末薑汁為丸貼手心一時自然出汗虛人亦可用心熱尿赤面紅口乾用木通生地甘草等分竹葉七片燈心一撮水煎服傷寒結胸蔥姜搗爛炒熱布包頻換熨之傷寒諸症八方傷寒發狂龍膽草為末雞蛋清白蜜化涼水服一錢熱病狂邪不避水火苦參為末蜜丸如梧桐子大每服十丸薄荷湯下或為末水煎服二錢亦可狂躁發熱吞生雞蛋一二個即時清爽大渴發熱生藕搗汁冷服傷寒發黃香油半盞和水半盞入雞蛋清一個攪勻服之神效舌生芒刺以新汲水浸青皮先洗其舌再用薑汁擦舌自退舌出不收冰片少許敥上即收風疹塊白雞冠花煎水洗寒熱咳嗽身痛頭暈二方厚朴陳皮半夏白芷桔梗茯苓各一錢甘草五分姜三片蔥白三寸水煎服出汗愈腹脹加腹皮噁心加藿香頭痛加川芎傷食加枳殼麥芽防風紫蘇甘葛前胡香附桔梗各一錢蒼朮羌活各八分陳皮川芎赤芍細辛甘草各三分姜引熱服出汗即愈感重無汗再服自愈感冒汗後煩熱口渴大小便閉葛根二錢柴胡前胡各一錢赤芍枳殼麥冬澤瀉各六分薄荷甘草各三分薑燈心引服二劑愈熱甚加黃芩知母花粉各五六分頭疼發熱口乾鼻涕甘葛二錢川芎黃芩甘草各一錢蔥姜引熱服出汗愈四治湯白砂糖五錢傷寒生薑湯下傷食山楂湯下傷暑陰陽水下婦人血崩百草湯下諸葛行軍散治一切感冒風寒綠豆粉麻黃乾薑陳皮各等分為末每服二錢涼水調下走出汗愈神仙粥治一切感冒傷寒黏米七分糯米三分老薑一大片打碎共煮至將熟加連須蔥白三根再煮熟加米醋少許去蔥姜乘熱食粥出汗即愈火症門三焦實熱等症三焦實火六經積熱煩躁作渴口舌生瘡小便赤大便結一切有餘之症連翹梔子黃芩桔梗薄荷各五分大黃芒硝各一錢甘草三分水煎入蜜同服咽喉痛加荊芥嘔吐加半夏煨姜衄血嘔血加當歸赤芍生地小便淋漓加茯苓滑石斑疹加甘葛荊芥川芎咳嗽加桑白皮杏仁陽黃髮斑加當歸結胸心下痞滿加枳殼譫語發狂加黃連黃柏赤芍眼中翳障赤澀流淚加菊花木賊生地咳嗽門咳嗽咳嗽久不愈久嗽連至四五十聲者久嗽氣急癆嗽補附四方咳嗽熟石膏款冬花生甘草硼砂共為細末吹入喉中細茶漱下咳嗽久不愈四方生薑半斤搗碎麻油蜂蜜各四兩微火漫熬成膏每早以開水調服大雪梨四個老薑四兩同搗取汁蜂蜜四兩黑豆一升炒研末乘熱和勻七蒸七曬不拘時服酸醋和水煮鯉魚不用鹽送飯吃完豬板油蒸南棗去棗皮惟食棗肉早晚吃三五個數日即愈久嗽連至四五十聲者生薑汁半杯白蜜二匙同放茶碗內滾水沖溫服三四次即愈久嗽氣急知母炒一錢杏仁薑汁泡去尖焙五錢水煎食遠服再以蘿蔔子杏仁等分為末米麵糊為丸如梧桐子大每服五十丸薑湯下絕病根癆嗽款冬百合煎湯服或熬膏服神效久嗽痰喘百藥不效天冬二兩麥冬貝母杏仁半夏各四兩切片水熬去渣取汁五碗入白葛粉四兩蜜一斤合前藥入壇內重湯煮成膏取出不拘時頻服老年久嗽不能臥豬板油米糖蜂蜜各四兩共熬成膏時常挑服一匙口中噙化三五日即止喘急二方白果炒十一個麻黃錢半蘇子半夏款冬花桑皮各一錢杏仁黃芩甘草各五分水煎服蘇子蘿蔔子白芥子各等分水煎服痰火喘嗽蛤蜊殼洗淨放炭火上燒焙莫燒過性燒出氣味響托放地去火毒研成細末磁壇收貯遇痰火症發少吃晚飯取一兩分為三服以麵糊為丸少用滾水將丸分三日吞下丸才吞下咽痰即隨丸而下真仙方也鴿糞在紅瓦上焙乾研成細灰好酒下立止癆病門癆病咳嗽吐白痰吐血癆嗽大補虛損血虛火旺癆病痰嗽灸癆蟲法癆病四方澤蘭葉根炆精肉加燒過淡鹽少許咽飯馬蹄草搗爛滾酒泡服遠志草用花與葉炆水作茶吃男用白花女用紅花干茶花每朵重三錢者炆腿精肉五鼓時喊醒與食咳嗽吐白痰取未出三歲者童便一罈紅棗一斤揀鮮圓者浸入壇內布紙固封碗蓋埋房內土中二十一天取棗以麻線穿之吊檐下陰乾每早勿洗臉食棗三枚用滾開水兌童便一湯匙送下一七之後服五枚二七之後七枚服完自愈癆嗽六方杏仁一兩淨器內搗融分為三服每服以冰糖三錢共入蓋碗以滾水沖蓋片時稍溫連仁服盡早晚服貝母冰糖各二兩同捶碎每早用三錢調雞蛋清一個滾水沖服百合四兩梨汁一中碗蜜半斤煉蜜成珠百合研末熬透入梨汁攬勻早晚以滾水沖服數匙蜂蜜薑汁各四兩白蘿蔔汁梨汁各半斤人乳一碗共熬成膏早晚滾湯沖服數匙二料除根癆嗽帶血款冬花百合蒸焙等分為末蜜丸龍眼大臨臥時薑湯調一丸服桑葉經霜者紅棗各一斤好酒五斤浸煮二柱香空心服三小杯不可多飲大補虛損牛乳建元各半斤煎膏酒兌服血虛火旺消補兩難服此神效人乳男用女胎乳女用男胎乳藕汁白蜜甜酒原汁等分同煎加童便熬成膏滴水不散每早空心下半盞病深者多服全愈若服寒涼藥則不效癆病痰嗽老白鴨一隻去毛水洗淨用竹刀剖開去淨穢物不見生水再入龍眼肉四十九個桃仁十個蓮肉一兩五錢貝母五錢線縫緊密入新鍋內加陳酒一斤童便二斤甜水一斤煮極爛熟先食肚內果子鴨湯鴨肉陸續食之皆可至重者四五次全愈灸癆蟲法用濕紙條貼脊背上紙先乾者即有癆蟲處以墨點記用艾多灸宜先備火盆鐵鉗伺候倘遇蟲出即用火鉗夾入火盆內燒之或遠埋野外土內謹防飛入人口鼻中失血門暴吐血吐血不止諸血立效吐血鼻血衄血吐血咳血痰內有血喀血凡失血勞傷等症飲童便者百無一死服寒涼者百無一生暴吐血陳皮生甘草各五錢共為末每用錢半燒酒調服立止吐血不止二方當歸二錢川芎錢半官桂三錢水煎服立止薏苡仁炒熟一兩柴胡炒